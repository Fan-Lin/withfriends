const MODES=[{id:"driving",label:"开车",icon:"🚗"},{id:"transit",label:"公交",icon:"🚌"},{id:"walking",label:"步行",icon:"🚶"},{id:"bicycling",label:"骑行",icon:"🚴"}];

/* ── Nav ───────────────────────────────────────────── */
function tryOpen(appUrl,webUrl){
  let opened=false;
  const h=()=>{opened=true};
  window.addEventListener('blur',h,{once:true});
  window.location.href=appUrl;
  setTimeout(()=>{window.removeEventListener('blur',h);if(!opened)window.open(webUrl,'_blank')},1500);
}
function openBaidu(r,mode){
  const d=encodeURIComponent(r.name+" "+r.address);
  const o=r.foundAt?`&origin=name:${encodeURIComponent(r.foundAt)}`:"";
  tryOpen(`baidumap://map/direction?destination=name:${d}&mode=${BAIDU_M[mode]||"driving"}&src=wf${o}`,
    `https://api.map.baidu.com/direction?origin=${r.foundAt?encodeURIComponent(r.foundAt):encodeURIComponent("我的位置")}&destination=${d}&mode=${BAIDU_M[mode]||"driving"}&output=html&src=webapp.withfriends`);
}
function openAmap(r,mode){
  const d=encodeURIComponent(r.name+" "+r.address);
  tryOpen(`androidamap://navi?sourceApplication=withfriends&dname=${encodeURIComponent(r.name)}&dev=0`,
    `https://uri.amap.com/navigation?to=,,${d}&mode=${AMAP_M[mode]||"car"}&callnative=1&src=wf`);
}

/* ── Share card ────────────────────────────────────── */
function generateCard(r,cats){
  const W=800,H=420;
  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const color=catColor(cats,r.category);
  const ar=avgRating(r);

  // bg
  ctx.fillStyle='#0c0c14';ctx.fillRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,W*0.7,H);
  g.addColorStop(0,color+'28');g.addColorStop(1,'#0c0c1400');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // left bar
  ctx.fillStyle=color;ctx.fillRect(0,0,5,H);

  ctx.textBaseline='middle';

  // name
  ctx.fillStyle='#f0f0f8';ctx.font='bold 46px sans-serif';
  const nm=r.name.length>15?r.name.slice(0,15)+'…':r.name;
  ctx.fillText(nm,48,90);

  // category + lines
  ctx.fillStyle=color;ctx.font='22px sans-serif';
  const sub=[(r.category||''),(r.lines||[]).map(l=>'🚇'+l).join(' ')].filter(Boolean).join('  ·  ');
  ctx.fillText(sub,48,140);

  // rating
  if(ar>0){
    ctx.fillStyle='#f0b429';ctx.font='26px sans-serif';
    ctx.fillText('★'.repeat(Math.round(ar))+'☆'.repeat(5-Math.round(ar)),48,185);
  }

  // address
  ctx.fillStyle='#556070';ctx.font='20px sans-serif';
  const addr=(r.address||'').length>32?r.address.slice(0,32)+'…':r.address;
  ctx.fillText('📍 '+(r.area?`${r.area}  `:'')+(addr||''),48,230);

  // top dishes
  const dishes=(r.visits||[]).flatMap(v=>(v.dishes||[])).filter(d=>d.rating>=4).slice(0,4).map(d=>d.name).join('  ·  ');
  if(dishes){
    ctx.fillStyle='#8888a8';ctx.font='19px sans-serif';
    const ds=dishes.length>36?dishes.slice(0,36)+'…':dishes;
    ctx.fillText('推荐  '+ds,48,276);
  }

  // visits
  const vc=(r.visits||[]).length;
  if(vc>0){ctx.fillStyle='#ffffff18';ctx.font='18px sans-serif';ctx.textAlign='right';ctx.fillText(`去过 ${vc} 次`,W-48,H-36);ctx.textAlign='left';}

  // brand
  ctx.fillStyle='#ffffff18';ctx.font='600 18px sans-serif';ctx.textAlign='right';
  ctx.fillText('withfriends',W-48,42);ctx.textAlign='left';

  return canvas.toDataURL('image/png');
}

async function doShare(r,cats){
  const dataUrl=generateCard(r,cats);
  try{
    const blob=await(await fetch(dataUrl)).blob();
    const file=new File([blob],`${r.name}.png`,{type:'image/png'});
    if(navigator.share&&navigator.canShare?.({files:[file]})){
      await navigator.share({title:r.name,files:[file]});return;
    }
  }catch(e){}
  // fallback: show image overlay to save/share
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:#000c;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px';
  const img=document.createElement('img');
  img.src=dataUrl;img.style.cssText='max-width:92vw;border-radius:12px';
  const hint=document.createElement('div');
  hint.style.cssText='color:#aaa;font-size:13px';hint.textContent='长按图片保存 · 点击背景关闭';
  overlay.appendChild(img);overlay.appendChild(hint);
  overlay.onclick=e=>{if(e.target===overlay)document.body.removeChild(overlay)};
  document.body.appendChild(overlay);
}

/* ── Helpers ───────────────────────────────────────── */
function catColor(cats,n){return(cats.find(c=>c.name===n)||{}).color||"#7a7a8a"}
function avgRating(r){const all=(r.visits||[]).flatMap(v=>(v.dishes||[]).map(d=>d.rating).filter(x=>x>0));return all.length?all.reduce((a,b)=>a+b,0)/all.length:0}
function lastVisit(r){const v=r.visits||[];return v.length?v[v.length-1].date:null}
function allText(r){return[r.name,r.address,r.area||"",r.foundAt||"",(r.tags||[]).join(" "),r.lines?.join(" ")||"",(r.visits||[]).flatMap(v=>(v.dishes||[]).map(d=>d.name)).join(" ")].join(" ")}
function matchSearch(r,q){return!q||allText(r).includes(q)}
function sortList(list,by){
  const c=[...list];
  if(by==="rating")c.sort((a,b)=>avgRating(b)-avgRating(a));
  else if(by==="recent")c.sort((a,b)=>(lastVisit(b)||"").localeCompare(lastVisit(a)||""));
  else c.sort((a,b)=>b.id-a.id);
  return c;
}

/* ── Stars ─────────────────────────────────────────── */
function Stars({value=0,onChange,size=17,readonly=false}){
  const[h,setH]=useState(0);
  return(<div style={{display:"flex",gap:1,pointerEvents:readonly?"none":"auto"}}>
    {[1,2,3,4,5].map(n=>(
      <button key={n} style={{background:"none",border:"none",cursor:readonly?"default":"pointer",padding:"2px",fontSize:size,color:(readonly?value:h||value)>=n?"#f0b429":"#252538",lineHeight:1}}
        onMouseEnter={()=>!readonly&&setH(n)} onMouseLeave={()=>setH(0)}
        onClick={()=>!readonly&&onChange?.(value===n?0:n)}>★</button>
    ))}
  </div>);
}

/* ── SwipeCard ─────────────────────────────────────── */
function SwipeCard({onDelete,children}){
  const[ox,setOx]=useState(0);const[sw,setSw]=useState(false);
  const sx=useRef(0),sy=useRef(0),hz=useRef(false);const T=80;
  const onTS=e=>{sx.current=e.touches[0].clientX;sy.current=e.touches[0].clientY;hz.current=false;setSw(false)};
  const onTM=e=>{
    const dx=e.touches[0].clientX-sx.current,dy=e.touches[0].clientY-sy.current;
    if(!hz.current&&Math.abs(dy)>Math.abs(dx))return;
    if(!hz.current&&sx.current<40)return;
    if(!hz.current&&Math.abs(dx)>6)hz.current=true;
    if(!hz.current)return;
    e.preventDefault();setOx(Math.min(0,dx));setSw(true);
  };
  const onTE=()=>{setOx(ox<-T?-T:0);setSw(false)};
  return(<div style={{position:"relative",overflow:"hidden",borderRadius:12,marginBottom:2}}>
    <div style={{position:"absolute",right:0,top:0,bottom:0,width:80,background:"#d13b2a",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"0 12px 12px 0"}}>
      <button style={{background:"none",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}
        onClick={()=>{if(confirm("删除这家？"))onDelete()}}><span style={{fontSize:16}}>🗑️</span><span>删除</span></button>
    </div>
    <div style={{transform:`translateX(${ox}px)`,transition:sw?"none":"transform 0.25s cubic-bezier(.4,0,.2,1)",position:"relative",zIndex:1}}
      onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
      onClick={ox<=-T?()=>setOx(0):undefined}>{children}</div>
  </div>);
}

      <div style={{width:36,height:4,borderRadius:2,background:"#2a2a44",margin:"0 auto 14px"}}/>

function NavSheet({r,mode,setMode,onClose}){

/* ── VisitForm ─────────────────────────────────────── */
function VisitForm({onSave,onCancel}){
  const[dishes,setDishes]=useState([{name:"",rating:0}]);
  const[note,setNote]=useState("");
  function save(){
    const v={id:Date.now(),date:new Date().toLocaleDateString("zh-CN"),dishes:dishes.filter(d=>d.name.trim()),note};
    onSave(v);
  }
  return(<div style={{background:"#0c0c14",borderRadius:8,padding:"12px",border:"1px solid #1e1e30",marginBottom:10}}>
    <div style={{...S.microLabel,marginBottom:8}}>这次吃了什么？</div>
    {dishes.map((d,i)=>(
      <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
        <input style={{...S.input,flex:1,padding:"7px 10px",fontSize:13}} placeholder="菜名"
          value={d.name} onChange={e=>{const c=[...dishes];c[i]={...c[i],name:e.target.value};setDishes(c)}}/>
        <Stars value={d.rating} onChange={v=>{const c=[...dishes];c[i]={...c[i],rating:v};setDishes(c)}} size={16}/>
        {dishes.length>1&&<button style={{background:"none",border:"none",color:"#446",cursor:"pointer",fontSize:14,padding:"0 2px",lineHeight:1}} onClick={()=>setDishes(dishes.filter((_,j)=>j!==i))}>✕</button>}
      </div>
    ))}
    <button style={{...S.chip,color:"#668",borderColor:"#20203a",marginBottom:8}} onClick={()=>setDishes([...dishes,{name:"",rating:0}])}>+ 加一道</button>
    <textarea style={{...S.input,minHeight:44,resize:"vertical",fontSize:13,marginTop:4,display:"block"}} placeholder="备注（可选）" value={note} onChange={e=>setNote(e.target.value)}/>
    <div style={{display:"flex",gap:8,marginTop:10}}>
      <button style={{...S.btn,background:"transparent",color:"#446",border:"1px solid #20203a",marginTop:0,flex:1}} onClick={onCancel}>跳过</button>
      <button style={{...S.btn,marginTop:0,flex:2}} className="press" onClick={save}>保存打卡</button>
    </div>
  </div>);
}

/* ── App ───────────────────────────────────────────── */
function App(){
  const[rs,setRs]=useState(()=>{try{return JSON.parse(localStorage.getItem("wf5_r"))||[]}catch{return[]}});
  const[cats,setCats]=useState(()=>{try{return JSON.parse(localStorage.getItem("wf5_c"))||DEF_CATS}catch{return DEF_CATS}});
  const[metroLines,setMetroLines]=useState(()=>{try{return JSON.parse(localStorage.getItem("wf5_l"))||[]}catch{return[]}});
  const[tab,setTab]=useState(0);
  const[view,setView]=useState(null);
  const[sel,setSel]=useState(null);
  const[navSheet,setNavSheet]=useState(null);
  const[navMode,setNavMode]=useState("transit");
  const[search,setSearch]=useState("");
  const[fCat,setFCat]=useState("全部");
  const[fLine,setFLine]=useState("全部");
  const[sortBy,setSortBy]=useState("added");
  const[groupBy,setGroupBy]=useState("none");
  const[collapsed,setCollapsed]=useState({});
  const[form,setForm]=useState({name:"",address:"",area:"",foundAt:"",category:"",lines:[],note:"",tags:""});

  useEffect(()=>{if(!form.category&&cats.length)setForm(f=>({...f,category:cats[0].name}))},[cats]);
  useEffect(()=>{try{localStorage.setItem("wf5_r",JSON.stringify(rs))}catch{}},[rs]);
  useEffect(()=>{try{localStorage.setItem("wf5_c",JSON.stringify(cats))}catch{}},[cats]);
  useEffect(()=>{try{localStorage.setItem("wf5_l",JSON.stringify(metroLines))}catch{}},[metroLines]);
  // Reset filters on tab change
  useEffect(()=>{setFCat("全部");setFLine("全部");setCollapsed({});},[tab]);
  // Sync sel with rs — fix stale detail view, handle deletion
  useEffect(()=>{
    if(!sel)return;
    const found=rs.find(r=>r.id===sel.id);
    if(!found){setView(null);setSel(null);}
    else setSel(found);
  },[rs]);

  const statusFilter=tab===1?"想去":tab===2?"已去":null;
  const filtered=rs.filter(r=>{
    if(statusFilter&&r.status!==statusFilter)return false;
    if(fCat==="__warn__"){if(!(r.status==="已去"&&avgRating(r)>0&&avgRating(r)<=2))return false;}
    else if(fCat!=="全部"&&r.category!==fCat)return false;
    if(fLine!=="全部"&&!(r.lines||[]).includes(fLine))return false;
    return matchSearch(r,search);
  });
  const sorted=sortList(filtered,sortBy);

  function buildGroups(list){
    if(groupBy==="none")return[{key:null,items:list}];
    const gKey=groupBy==="category"?"category":"area";
    const map={};
    list.forEach(r=>{const k=(gKey==="category"?r.category:r.area)||"未分类";if(!map[k])map[k]=[];map[k].push(r)});
    return Object.entries(map).filter(([,v])=>v.length>0).map(([k,items])=>({key:k,items}));
  }
  // When searching, collapse all groups (auto-expand)
  const effectiveCollapsed=search?{}:collapsed;
  const groups=buildGroups(sorted);

  // CRUD
  function addR(){
    if(!form.name.trim()||!form.address.trim())return;
    const cat=form.category||cats[0]?.name||"其他";
    setRs(p=>[{id:Date.now(),...form,category:cat,status:"想去",visits:[],
      tags:form.tags.split(SPLIT).filter(Boolean),createdAt:new Date().toLocaleDateString("zh-CN")},...p]);
    setForm({name:"",address:"",area:"",foundAt:"",category:cat,lines:[],note:"",tags:""});
    setTab(1);setView(null);// go to 想去 tab
  }
  function delR(id){
    setRs(p=>p.filter(r=>r.id!==id));
    // sel/view cleanup handled by useEffect
  }
  function upd(id,patch){
    setRs(p=>p.map(r=>r.id===id?{...r,...patch}:r));
    // sel synced via useEffect
  }
  function addVisit(id,visit){
    const dishes=visit.dishes.filter(d=>d.name.trim());
    const v={...visit,dishes};
    setRs(p=>p.map(r=>r.id===id?{...r,visits:[...(r.visits||[]),v]}:r));
    // sel synced via useEffect
  }
  function toggleStatus(id,currentStatus){
    const newSt=currentStatus==="想去"?"已去":"想去";
    setRs(p=>p.map(r=>r.id===id?{...r,status:newSt}:r));
  }

  function exportData(){
    const d=JSON.stringify({restaurants:rs,categories:cats,metroLines,exportedAt:new Date().toISOString()},null,2);
    const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);
    const a=document.createElement("a");a.href=u;a.download="withfriends_backup.json";a.click();URL.revokeObjectURL(u);
  }
  function importData(e){
    const f=e.target.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);
        if(d.restaurants)setRs(d.restaurants);
        if(d.categories)setCats(d.categories);
        if(d.metroLines)setMetroLines(d.metroLines);
        alert(`导入成功！${d.restaurants?.length||0} 家餐厅`);
      }catch{alert("文件格式错误")}
    };rd.readAsText(f);e.target.value="";
  }

  const wantN=rs.filter(r=>r.status==="想去").length;
  const beenN=rs.filter(r=>r.status==="已去").length;
  const totalVisits=rs.reduce((s,r)=>s+(r.visits||[]).length,0);

  return(<div style={S.root}>
    <header style={S.header}><div style={S.headerIn}>
      <div style={{display:"flex",alignItems:"center"}}>
        <Logo/><div style={{marginLeft:10}}>
          <div style={S.logoT}>withfriends</div>
          <div style={S.logoS}>{wantN} to visit · {beenN} been</div>
        </div>
      </div>
      <button style={S.addBtn} className="press" onClick={()=>{
        setForm({name:"",address:"",area:"",foundAt:"",category:cats[0]?.name||"",lines:[],note:"",tags:""});
        setView("add");
      }}>+ Add</button>
    </div></header>

    {view==="add"&&<AddView form={form} setForm={setForm} cats={cats} metroLines={metroLines} onSave={addR} onBack={()=>setView(null)}/>}
    {view==="detail"&&sel&&(
      <DetailView r={sel} cats={cats} metroLines={metroLines} upd={upd} del={delR} back={()=>setView(null)}
        onShare={()=>doShare(sel,cats)} setNavSheet={setNavSheet}
        onToggleStatus={()=>toggleStatus(sel.id,sel.status)}
        onAddVisit={v=>addVisit(sel.id,v)}/>
    )}
    {view===null&&tab<3&&(
      <ListView tab={tab} search={search} setSearch={setSearch}
        fCat={fCat} setFCat={setFCat} fLine={fLine} setFLine={setFLine}
        metroLines={metroLines} cats={cats}
        sortBy={sortBy} setSortBy={setSortBy}
        groupBy={groupBy} setGroupBy={setGroupBy}
        groups={groups} collapsed={effectiveCollapsed} setCollapsed={setCollapsed}
        openDetail={r=>{setSel(r);setView("detail");}}
        upd={upd} del={delR} setNavSheet={setNavSheet}
        onToggleStatus={toggleStatus}/>
    )}
    {view===null&&tab===3&&(
      <SettingsView cats={cats} setCats={setCats} metroLines={metroLines} setMetroLines={setMetroLines}
        exportData={exportData} importData={importData}
        stats={{restaurants:rs.length,visits:totalVisits}}/>
    )}

    <BottomSheet open={!!navSheet} onClose={()=>setNavSheet(null)}>
      {navSheet&&<NavSheet r={navSheet} mode={navMode} setMode={setNavMode} onClose={()=>setNavSheet(null)}/>}
    </BottomSheet>

    <nav style={S.tabBar}>
      {[{l:"全部",i:"🏠"},{l:"想去",i:"📌"},{l:"去过",i:"✓"},{l:"设置",i:"⚙️"}].map((t,i)=>(
        <button key={i} style={{...S.tabBtn,...(tab===i?S.tabBtnA:{})}}
          onClick={()=>{setTab(i);setView(null);setSel(null);}}>
          <span style={{fontSize:16,lineHeight:1}}>{t.i}</span>
          <span style={{fontSize:10,marginTop:2}}>{t.l}</span>
        </button>
      ))}
    </nav>
  </div>);
}

/* ── ListView ──────────────────────────────────────── */

/* ── Card ──────────────────────────────────────────── */

/* ── DetailView ────────────────────────────────────── */

        <span style={{...S.badge,fontSize:11,marginLeft:8,background:warn?"#f8717118":been?"#6ee7b718":"#ffffff08",

    {been&&<div style={S.section}>

/* ── SettingsView ──────────────────────────────────── */
function SettingsView({cats,setCats,metroLines,setMetroLines,exportData,importData,stats}){
  const[catsOpen,setCatsOpen]=useState(false);
  const[linesOpen,setLinesOpen]=useState(false);
  const[colorFor,setColorFor]=useState(null);
  const[newCat,setNewCat]=useState("");const[newCatColor,setNewCatColor]=useState(COLORS[0]);
  const[newLine,setNewLine]=useState("");
  const[err,setErr]=useState("");
  const fileRef=useRef();

  function addCat(){
    const n=newCat.trim();if(!n)return;
    if(cats.find(c=>c.name===n)){setErr("已有同名菜系");return}
    setCats(p=>[...p,{name:n,color:newCatColor}]);setNewCat("");setErr("");
  }
  function addLine(){
    const n=newLine.trim();if(!n)return;
    if(metroLines.find(l=>l.name===n)){setErr("已有该线路");return}
    setMetroLines(p=>[...p,{name:n}]);setNewLine("");setErr("");
  }

  return(<main style={S.main}><div style={S.formCard}>
    <h2 style={S.formTitle}>设置</h2>

    {/* Categories */}
    <button style={S.collapseHdr} onClick={()=>{setCatsOpen(!catsOpen);setColorFor(null)}}>
      <span style={{fontSize:13,fontWeight:600,color:"#d0d0e0"}}>菜系分类</span>
      <span style={{fontSize:12,color:"#334",display:"inline-block",transform:catsOpen?"rotate(0)":"rotate(-90deg)",transition:"transform 0.2s"}}>▾</span>
    </button>
    {catsOpen&&<div style={{...S.section,borderRadius:"0 0 10px 10px",borderTop:"none"}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
        {cats.map(c=>(
          <div key={c.name} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#14142a",borderRadius:20,padding:"4px 8px 4px 6px",border:"1px solid #1e1e30"}}>
            <button style={{background:"none",border:"none",cursor:"pointer",padding:0,lineHeight:1}} onClick={()=>setColorFor(colorFor===c.name?null:c.name)}>
              <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:c.color}}/>
            </button>
            <span style={{fontSize:12,color:"#c0c0d8"}}>{c.name}</span>
            <button style={{background:"none",border:"none",cursor:"pointer",color:"#334",fontSize:11,padding:"0 0 0 2px",lineHeight:1}}
              onClick={()=>{if(cats.length<=1){setErr("至少保留一个");return}setCats(p=>p.filter(x=>x.name!==c.name));if(colorFor===c.name)setColorFor(null)}}>✕</button>
          </div>
        ))}
      </div>
      {colorFor&&<div style={{marginBottom:10,padding:"8px 10px",background:"#0c0c14",borderRadius:8,border:"1px solid #1e1e30"}}>
        <div style={{fontSize:10,color:"#334",marginBottom:6}}>「{colorFor}」换颜色</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {COLORS.map(col=><button key={col} style={{width:18,height:18,borderRadius:4,border:"none",cursor:"pointer",background:col,
            outline:cats.find(c=>c.name===colorFor)?.color===col?"2px solid #fff":"none",outlineOffset:2}}
            onClick={()=>{setCats(p=>p.map(c=>c.name===colorFor?{...c,color:col}:c));setColorFor(null)}}/>)}
        </div>
      </div>}
      {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:6}}>{err}</div>}
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <input style={{...S.input,flex:1,padding:"7px 10px",fontSize:13}} placeholder="新菜系"
          value={newCat} onChange={e=>{setNewCat(e.target.value);setErr("")}}
          onKeyDown={e=>e.key==="Enter"&&addCat()}/>
        <div style={{display:"flex",gap:3}}>
          {COLORS.slice(0,7).map(col=><button key={col} style={{width:16,height:16,borderRadius:3,border:"none",cursor:"pointer",background:col,
            outline:newCatColor===col?"2px solid #fff":"none",outlineOffset:1}} onClick={()=>setNewCatColor(col)}/>)}
        </div>
        <button style={{background:"#fff",color:"#0c0c14",border:"none",borderRadius:8,padding:"7px 12px",fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0}} onClick={addCat}>+</button>
      </div>
    </div>}

    {/* Metro Lines */}
    <button style={{...S.collapseHdr,marginTop:8}} onClick={()=>setLinesOpen(!linesOpen)}>
      <span style={{fontSize:13,fontWeight:600,color:"#d0d0e0"}}>地铁线路</span>
      <span style={{fontSize:12,color:"#334",display:"inline-block",transform:linesOpen?"rotate(0)":"rotate(-90deg)",transition:"transform 0.2s"}}>▾</span>
    </button>
    {linesOpen&&<div style={{...S.section,borderRadius:"0 0 10px 10px",borderTop:"none"}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
        {metroLines.length===0&&<span style={{fontSize:12,color:"#334"}}>还没有线路，添加你常用的</span>}
        {metroLines.map(l=>(
          <div key={l.name} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#14142a",borderRadius:20,padding:"4px 8px 4px 8px",border:"1px solid #1e2a3a"}}>
            <span style={{fontSize:12,color:"#5588aa"}}>🚇 {l.name}</span>
            <button style={{background:"none",border:"none",cursor:"pointer",color:"#334",fontSize:11,padding:"0 0 0 2px",lineHeight:1}}
              onClick={()=>setMetroLines(p=>p.filter(x=>x.name!==l.name))}>✕</button>
          </div>
        ))}
      </div>
      {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:6}}>{err}</div>}
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <input style={{...S.input,flex:1,padding:"7px 10px",fontSize:13}} placeholder="如：1号线、10号线"
          value={newLine} onChange={e=>{setNewLine(e.target.value);setErr("")}}
          onKeyDown={e=>e.key==="Enter"&&addLine()}/>
        <button style={{background:"#fff",color:"#0c0c14",border:"none",borderRadius:8,padding:"7px 12px",fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0}} onClick={addLine}>+</button>
      </div>
    </div>}

    {/* Data */}
    <div style={{marginTop:20}}>
      <div style={S.microLabel}>数据管理</div>
      <div style={{fontSize:12,color:"#334",margin:"6px 0 10px"}}>{stats.restaurants} 家餐厅 · {stats.visits} 次打卡</div>
      <button style={{...S.btn,background:"#151f30",color:"#60a0e0",border:"1px solid #1e3050",marginTop:0}} onClick={exportData}>📥 导出备份 (JSON)</button>
      <button style={{...S.btn,background:"#1a1520",color:"#a080d0",border:"1px solid #2a1e40",marginTop:8}} onClick={()=>fileRef.current?.click()}>📤 导入恢复</button>
      <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
      <div style={{fontSize:11,color:"#1e1e2e",marginTop:10,textAlign:"center"}}>定期导出，换手机不丢数据</div>
    </div>

    {/* About */}
    <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid #14142a"}}>
      <div style={S.microLabel}>关于</div>
      <div style={{fontSize:12,color:"#223",marginTop:6}}>withfriends v{VER}</div>
    </div>
  </div></main>);
}

/* ── Styles ─────────────────────────────────────────── */
