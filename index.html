<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0c0c14"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon-192.png"/>
<title>withfriends</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700;9..40,800&family=Noto+Sans+SC:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0c14;color:#d0d0e0;font-family:'DM Sans','Noto Sans SC',system-ui,sans-serif;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
input,textarea,button{font-family:inherit}
input::placeholder,textarea::placeholder{color:#1e1e2e}
input:focus,textarea:focus{border-color:#2a2a44!important;outline:none}
::-webkit-scrollbar{width:0}
.press:active{transform:scale(0.97)}
</style>
<script>
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

/* ── Constants ─────────────────────────────────────── */
const DEF_CATS=[
{name:"川菜",color:"#e85d26"},{name:"粤菜",color:"#c8973a"},{name:"日料",color:"#5f8fcc"},
{name:"烤肉",color:"#b5451b"},{name:"火锅",color:"#d13b2a"},{name:"面食",color:"#c8843a"},
{name:"其他",color:"#7a7a8a"}];
const COLORS=["#e85d26","#c8973a","#5f8fcc","#b5451b","#d13b2a","#c8843a","#7a7a8a","#4a9e6e","#8a5ccc","#cc5c8a","#6ab0a0","#a0886a","#5588aa","#9a7040"];
const MODES=[{id:"driving",label:"开车",icon:"🚗"},{id:"transit",label:"公交",icon:"🚌"},{id:"walking",label:"步行",icon:"🚶"},{id:"bicycling",label:"骑行",icon:"🚴"}];
const BAIDU_M={driving:"driving",transit:"transit",walking:"walking",bicycling:"riding"};
const AMAP_M={driving:"car",transit:"bus",walking:"walk",bicycling:"ride"};

/* ── Map URLs ──────────────────────────────────────── */
function baiduUrl(r,mode){
  const d=encodeURIComponent(r.name+" "+r.address);
  const o=r.foundAt?encodeURIComponent(r.foundAt):encodeURIComponent("我的位置");
  return`https://api.map.baidu.com/direction?origin=${o}&destination=${d}&mode=${BAIDU_M[mode]||"driving"}&output=html&src=webapp.withfriends`;
}
function amapUrl(r,mode){
  const d=encodeURIComponent(r.name+" "+r.address);
  return`https://uri.amap.com/navigation?to=,,${d}&mode=${AMAP_M[mode]||"car"}&callnative=1&src=webapp.withfriends`;
}

/* ── Helpers ───────────────────────────────────────── */
function catColor(cats,n){return(cats.find(c=>c.name===n)||{}).color||"#7a7a8a"}
function avgRating(r){
  const all=(r.visits||[]).flatMap(v=>(v.dishes||[]).map(d=>d.rating).filter(x=>x>0));
  return all.length?all.reduce((a,b)=>a+b,0)/all.length:0;
}
function lastVisit(r){
  const v=r.visits||[];
  return v.length?v[v.length-1].date:null;
}
function allDishNames(r){
  return(r.visits||[]).flatMap(v=>(v.dishes||[]).map(d=>d.name)).join(" ");
}
function matchSearch(r,q){
  if(!q)return true;
  return[r.name,r.address,r.note||"",r.foundAt||"",(r.tags||[]).join(" "),allDishNames(r)].some(s=>s.includes(q));
}
function sortList(list,by){
  const copy=[...list];
  if(by==="rating")copy.sort((a,b)=>avgRating(b)-avgRating(a));
  else if(by==="recent")copy.sort((a,b)=>(lastVisit(b)||"").localeCompare(lastVisit(a)||""));
  else copy.sort((a,b)=>b.id-a.id);
  return copy;
}

/* ── Logo ──────────────────────────────────────────── */
function Logo({size=36}){return(
<svg width={size} height={size} viewBox="0 0 36 36" fill="none">
<circle cx="18" cy="21" r="10" stroke="#ffffff40" strokeWidth="1.5"/>
<path d="M13 11 Q14 9 13 7" stroke="#f0b429" strokeWidth="1.5" strokeLinecap="round"/>
<path d="M18 10 Q19 8 18 6" stroke="#f0b429" strokeWidth="1.5" strokeLinecap="round"/>
<path d="M23 11 Q24 9 23 7" stroke="#f0b429" strokeWidth="1.5" strokeLinecap="round"/>
<line x1="12.5" y1="17" x2="12.5" y2="25" stroke="#ffffff80" strokeWidth="1.4" strokeLinecap="round"/>
<line x1="11.5" y1="17" x2="11.5" y2="20" stroke="#ffffff50" strokeWidth="1.2" strokeLinecap="round"/>
<line x1="13.5" y1="17" x2="13.5" y2="20" stroke="#ffffff50" strokeWidth="1.2" strokeLinecap="round"/>
<ellipse cx="23.5" cy="17" rx="1.5" ry="2" stroke="#ffffff80" strokeWidth="1.3"/>
<line x1="23.5" y1="19" x2="23.5" y2="25" stroke="#ffffff80" strokeWidth="1.4" strokeLinecap="round"/>
<path d="M17.5 22 C17.5 21 16 20 16 21.5 C16 23 17.5 24 17.5 24 C17.5 24 19 23 19 21.5 C19 20 17.5 21 17.5 22Z" fill="#f87171"/>
</svg>)}

/* ── Stars ─────────────────────────────────────────── */
function Stars({value=0,onChange,size=17}){
  const[h,setH]=useState(0);
  return(<div style={{display:"flex",gap:1}}>
    {[1,2,3,4,5].map(n=><button key={n} style={{background:"none",border:"none",cursor:"pointer",padding:"2px",fontSize:size,color:(h||value)>=n?"#f0b429":"#252538",lineHeight:1}}
      onMouseEnter={()=>setH(n)} onMouseLeave={()=>setH(0)} onClick={()=>onChange?.(value===n?0:n)}>★</button>)}
  </div>);
}

/* ── SwipeCard ─────────────────────────────────────── */
function SwipeCard({onDelete,children}){
  const[ox,setOx]=useState(0);const[sw,setSw]=useState(false);
  const sx=useRef(0);const sy=useRef(0);const hz=useRef(false);const T=80;
  const onTS=e=>{sx.current=e.touches[0].clientX;sy.current=e.touches[0].clientY;hz.current=false;setSw(false)};
  const onTM=e=>{
    const dx=e.touches[0].clientX-sx.current,dy=e.touches[0].clientY-sy.current;
    if(!hz.current&&Math.abs(dy)>Math.abs(dx))return;
    // Ignore if started near left edge (android back gesture)
    if(!hz.current&&sx.current<35)return;
    if(!hz.current&&Math.abs(dx)>6)hz.current=true;
    if(!hz.current)return;
    e.preventDefault();setOx(Math.min(0,dx));setSw(true);
  };
  const onTE=()=>{setOx(ox<-T?-T:0);setSw(false)};
  return(<div style={{position:"relative",overflow:"hidden",borderRadius:12,marginBottom:2}}>
    <div style={{position:"absolute",right:0,top:0,bottom:0,width:80,background:"#d13b2a",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"0 12px 12px 0"}}>
      <button style={{background:"none",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}
        onClick={()=>{if(confirm("删除这家？"))onDelete()}}><span style={{fontSize:16}}>🗑️</span><span>删除</span></button>
    </div>
    <div style={{transform:`translateX(${ox}px)`,transition:sw?"none":"transform 0.25s cubic-bezier(.4,0,.2,1)",position:"relative",zIndex:1}}
      onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
      onClick={ox<=-T?()=>setOx(0):undefined}>{children}</div>
  </div>);
}

/* ── BottomSheet ───────────────────────────────────── */
function BottomSheet({open,onClose,children}){
  if(!open)return null;
  return(<>
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"#000a",zIndex:300}}/>
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#11111b",borderRadius:"16px 16px 0 0",padding:"20px 18px",paddingBottom:34,zIndex:301,maxHeight:"60vh",overflow:"auto",
      animation:"sheetUp 0.25s ease-out"}}>
      <style>{`@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}`}</style>
      <div style={{width:36,height:4,borderRadius:2,background:"#2a2a44",margin:"0 auto 16px"}}/>
      {children}
    </div>
  </>);
}

/* ── Main App ──────────────────────────────────────── */
function App(){
  const[rs,setRs]=useState(()=>{try{return JSON.parse(localStorage.getItem("wf4_r"))||[]}catch{return[]}});
  const[cats,setCats]=useState(()=>{try{return JSON.parse(localStorage.getItem("wf4_c"))||DEF_CATS}catch{return DEF_CATS}});
  const[tab,setTab]=useState(0);// 0=全部 1=想去 2=去过 3=设置
  const[view,setView]=useState(null);// null|"add"|"detail"
  const[sel,setSel]=useState(null);
  const[search,setSearch]=useState("");
  const[fCat,setFCat]=useState("全部");
  const[sortBy,setSortBy]=useState("added");
  const[groupBy,setGroupBy]=useState("none");
  const[collapsed,setCollapsed]=useState({});
  const[navSheet,setNavSheet]=useState(null);// restaurant for nav sheet
  const[navMode,setNavMode]=useState("transit");
  const[form,setForm]=useState({name:"",address:"",foundAt:"",category:"",note:"",tags:""});

  useEffect(()=>{if(!form.category&&cats.length)setForm(f=>({...f,category:cats[0].name}))},[cats]);
  useEffect(()=>{try{localStorage.setItem("wf4_r",JSON.stringify(rs))}catch{}},[rs]);
  useEffect(()=>{try{localStorage.setItem("wf4_c",JSON.stringify(cats))}catch{}},[cats]);

  // Filter
  const statusFilter=tab===1?"想去":tab===2?"已去":null;
  const filtered=rs.filter(r=>{
    if(statusFilter&&r.status!==statusFilter)return false;
    if(fCat!=="全部"&&r.category!==fCat)return false;
    return matchSearch(r,search);
  });
  const sorted=sortList(filtered,sortBy);

  // Groups
  function buildGroups(list){
    if(groupBy==="none")return[{key:null,items:list}];
    const map={};
    list.forEach(r=>{const k=groupBy==="category"?(r.category||"其他"):(r.status||"想去");if(!map[k])map[k]=[];map[k].push(r)});
    return Object.entries(map).map(([key,items])=>({key,items}));
  }
  const groups=buildGroups(sorted);

  // CRUD
  function add(){
    if(!form.name.trim()||!form.address.trim())return;
    const cat=form.category||cats[0]?.name||"其他";
    setRs(p=>[{id:Date.now(),...form,category:cat,status:"想去",visits:[],
      tags:form.tags.split(/[,，\s]+/).filter(Boolean),createdAt:new Date().toLocaleDateString("zh-CN")},...p]);
    setForm({name:"",address:"",foundAt:"",category:cat,note:"",tags:""});
    setView(null);
  }
  function del(id){setRs(p=>p.filter(r=>r.id!==id));if(sel?.id===id){setView(null);setSel(null)}}
  function upd(id,patch){
    setRs(p=>p.map(r=>r.id===id?{...r,...patch}:r));
    if(sel?.id===id)setSel(s=>({...s,...patch}));
  }
  function openDetail(r){setSel(r);setView("detail")}
  function back(){setView(null);setSel(null)}

  // Share
  function share(r){
    const ar=avgRating(r);const dishes=r.visits?.flatMap(v=>v.dishes||[]).filter(d=>d.rating>=4).map(d=>d.name).slice(0,5).join("、");
    const txt=`📍 ${r.name}\n${r.address}${ar?`\n评分 ${"★".repeat(Math.round(ar))}${"☆".repeat(5-Math.round(ar))}`:""}\n${dishes?`推荐：${dishes}`:""}`;
    if(navigator.share)navigator.share({title:r.name,text:txt}).catch(()=>{});
    else{navigator.clipboard?.writeText(txt);alert("已复制到剪贴板")}
  }

  // Export/Import
  function exportData(){
    const d=JSON.stringify({restaurants:rs,categories:cats},null,2);
    const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);
    const a=document.createElement("a");a.href=u;a.download="withfriends_backup.json";a.click();URL.revokeObjectURL(u);
  }
  function importData(e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);
        if(d.restaurants)setRs(d.restaurants);
        if(d.categories)setCats(d.categories);
        alert("导入成功！");
      }catch{alert("文件格式错误")}
    };reader.readAsText(f);
  }

  const wantN=rs.filter(r=>r.status==="想去").length;
  const beenN=rs.filter(r=>r.status==="已去").length;

  return(<div style={S.root}>
    {/* Header */}
    <header style={S.header}><div style={S.headerIn}>
      <div style={{display:"flex",alignItems:"center"}}>
        <Logo/><div style={{marginLeft:10}}>
          <div style={S.logoT}>withfriends</div>
          <div style={S.logoS}>{wantN} to visit · {beenN} been</div>
        </div>
      </div>
      <button style={S.addBtn} className="press" onClick={()=>{
        setForm({name:"",address:"",foundAt:"",category:cats[0]?.name||"",note:"",tags:""});setView("add");
      }}>+ Add</button>
    </div></header>

    {/* Content */}
    {view==="add"&&<AddView form={form} setForm={setForm} cats={cats} onSave={add} onBack={back}/>}
    {view==="detail"&&sel&&<DetailView r={sel} cats={cats} upd={upd} del={del} back={back} share={share} setNavSheet={setNavSheet} navMode={navMode}/>}
    {view===null&&tab<3&&<ListView search={search} setSearch={setSearch} fCat={fCat} setFCat={setFCat}
      sortBy={sortBy} setSortBy={setSortBy} groupBy={groupBy} setGroupBy={setGroupBy}
      groups={groups} collapsed={collapsed} setCollapsed={setCollapsed} cats={cats}
      openDetail={openDetail} upd={upd} del={del} setNavSheet={setNavSheet} tab={tab}/>}
    {view===null&&tab===3&&<SettingsView cats={cats} setCats={setCats} exportData={exportData} importData={importData}/>}

    {/* Nav BottomSheet */}
    <BottomSheet open={!!navSheet} onClose={()=>setNavSheet(null)}>
      {navSheet&&<NavSheetContent r={navSheet} mode={navMode} setMode={setNavMode} onClose={()=>setNavSheet(null)}/>}
    </BottomSheet>

    {/* Tab Bar */}
    <nav style={S.tabBar}>
      {[{l:"全部",i:"🏠"},{l:"想去",i:"📌"},{l:"去过",i:"✓"},{l:"设置",i:"⚙️"}].map((t,i)=>(
        <button key={i} style={{...S.tabBtn,...(tab===i?S.tabBtnA:{})}}
          onClick={()=>{setTab(i);setView(null);setSel(null)}}>
          <span style={{fontSize:16}}>{t.i}</span>
          <span style={{fontSize:10,marginTop:2}}>{t.l}</span>
        </button>
      ))}
    </nav>
  </div>);
}

/* ── NavSheet Content ──────────────────────────────── */
function NavSheetContent({r,mode,setMode,onClose}){
  return(<div>
    <div style={{fontSize:15,fontWeight:700,color:"#f0f0f8",marginBottom:4}}>{r.name}</div>
    <div style={{fontSize:12,color:"#446",marginBottom:16}}>📍 {r.address}</div>
    <div style={{fontSize:10,color:"#334",letterSpacing:0.8,textTransform:"uppercase",marginBottom:8}}>出行方式</div>
    <div style={{display:"flex",gap:6,marginBottom:16}}>
      {MODES.map(m=><button key={m.id} style={{...S.chip,...(mode===m.id?{background:"#fff",color:"#0c0c14",borderColor:"#fff"}:{})}}
        onClick={()=>setMode(m.id)}>{m.icon} {m.label}</button>)}
    </div>
    <a href={baiduUrl(r,mode)} target="_blank" rel="noreferrer"
      style={{...S.btn,display:"block",textAlign:"center",textDecoration:"none",marginBottom:8,background:"#151f30",color:"#60a0e0",border:"1px solid #1e3050"}}
      onClick={onClose}>🔵 百度地图</a>
    <a href={amapUrl(r,mode)} target="_blank" rel="noreferrer"
      style={{...S.btn,display:"block",textAlign:"center",textDecoration:"none",background:"#152015",color:"#60c060",border:"1px solid #1e401e"}}
      onClick={onClose}>🟢 高德地图</a>
  </div>);
}

/* ── ListView ──────────────────────────────────────── */
function ListView({search,setSearch,fCat,setFCat,sortBy,setSortBy,groupBy,setGroupBy,groups,collapsed,setCollapsed,cats,openDetail,upd,del,setNavSheet,tab}){
  return(<main style={S.main}>
    <input style={S.searchInput} placeholder="搜餐厅、地址、菜品…" value={search} onChange={e=>setSearch(e.target.value)}/>
    {/* Category filter */}
    <div style={S.filterRow}>
      {["全部",...cats.map(c=>c.name)].map(c=>{
        const col=c!=="全部"?catColor(cats,c):null;
        return<button key={c} style={{...S.chip,...(fCat===c?S.chipA:{}),
          ...(c!=="全部"&&fCat!==c?{borderColor:col+"44",color:col}:{})}}
          onClick={()=>setFCat(c)}>{c}</button>
      })}
    </div>
    {/* Sort + Group */}
    <div style={{display:"flex",gap:12,marginBottom:14,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:4}}>
        <span style={S.microLabel}>排序</span>
        {[["added","时间"],["rating","评分"],["recent","最近去"]].map(([v,l])=>
          <button key={v} style={{...S.chip,...(sortBy===v?S.chipA2:{})}} onClick={()=>setSortBy(v)}>{l}</button>)}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:4}}>
        <span style={S.microLabel}>归类</span>
        {[["none","—"],["category","菜系"],["status","状态"]].map(([v,l])=>
          <button key={v} style={{...S.chip,...(groupBy===v?S.chipA2:{})}} onClick={()=>setGroupBy(v)}>{l}</button>)}
      </div>
    </div>
    {/* Avoid-mine toggle for 去过 tab */}
    {tab===2&&<div style={{marginBottom:10}}>
      <button style={{...S.chip,borderColor:"#f8717144",color:"#f87171"}} onClick={()=>setFCat(fCat==="避雷"?"全部":"避雷")}>
        {fCat==="避雷"?"显示全部去过":"⚠️ 只看避雷"}
      </button>
    </div>}

    {groups.every(g=>g.items.length===0)?(
      <div style={S.empty}><div style={{fontSize:38,marginBottom:10}}>🍽️</div>
        <div style={{color:"#33334a",fontSize:13}}>No spots yet</div></div>
    ):(
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {groups.map(({key,items})=>items.length>0&&<div key={key||"all"}>
          {key!==null&&<button style={{...S.groupHdr,borderLeft:groupBy==="category"?`3px solid ${catColor(cats,key)}`:"3px solid #446"}}
            onClick={()=>setCollapsed(p=>({...p,[key]:!p[key]}))}>
            <span style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:13,fontWeight:600,color:"#d0d0e0"}}>{key}</span>
              <span style={{fontSize:11,color:"#446"}}>{items.length}</span>
            </span>
            <span style={{fontSize:13,color:"#334",transform:collapsed[key]?"rotate(-90deg)":"rotate(0)",transition:"transform 0.2s",display:"inline-block"}}>▾</span>
          </button>}
          {!collapsed[key]&&items.map(r=>
            <SwipeCard key={r.id} onDelete={()=>del(r.id)}>
              <Card r={r} cats={cats} onOpen={()=>openDetail(r)} onNav={()=>setNavSheet(r)}
                onToggle={()=>{
                  const newSt=r.status==="想去"?"已去":"想去";
                  const visits=r.visits||[];
                  if(newSt==="已去"&&visits.length===0)upd(r.id,{status:newSt,visits:[{id:Date.now(),date:new Date().toLocaleDateString("zh-CN"),dishes:[],note:""}]});
                  else upd(r.id,{status:newSt});
                }}/>
            </SwipeCard>
          )}
        </div>)}
      </div>
    )}
  </main>);
}

/* ── Card ──────────────────────────────────────────── */
function Card({r,cats,onOpen,onNav,onToggle}){
  const been=r.status==="已去";const ar=avgRating(r);const warn=been&&ar>0&&ar<=2;
  const accent=warn?"#f87171":been?"#6ee7b7":catColor(cats,r.category);
  const vc=(r.visits||[]).length;
  const lv=lastVisit(r);
  return(<div style={{...S.card,borderLeft:`3px solid ${accent}44`}}>
    <div style={S.cardBody} onClick={onOpen}>
      <div style={S.cardRow}>
        <span style={S.cardName}>{r.name}</span>
        <span style={{...S.badge,background:warn?"#f8717118":been?"#6ee7b718":"#ffffff08",
          color:warn?"#f87171":been?"#6ee7b7":"#556"}}>
          {warn?"避雷 ⚠️":been?`✓ ${vc}次`:"想去"}</span>
      </div>
      <div style={S.cardAddr}>📍 {r.address}</div>
      {been&&ar>0&&<div style={{fontSize:11,color:"#f0b429",letterSpacing:1,marginTop:2}}>
        {"★".repeat(Math.round(ar))}{"☆".repeat(5-Math.round(ar))}{lv&&<span style={{color:"#334",marginLeft:6}}>最近 {lv}</span>}</div>}
    </div>
    <div style={S.cardActs}>
      <button style={{...S.actBtn,color:been?"#6ee7b7":"#f0b429",borderColor:been?"#6ee7b722":"#f0b42922"}}
        onClick={e=>{e.stopPropagation();onToggle()}}>{been?"↩ 想去":"✓ 去了"}</button>
      <div style={{flex:1}}/>
      <button style={S.navBtn} onClick={e=>{e.stopPropagation();onNav()}}>导航 →</button>
    </div>
  </div>);
}

/* ── DetailView ────────────────────────────────────── */
function DetailView({r,cats,upd,del,back,share,setNavSheet,navMode}){
  const color=catColor(cats,r.category);const been=r.status==="已去";const ar=avgRating(r);const warn=been&&ar>0&&ar<=2;
  const[editing,setEditing]=useState(false);
  const[ef,setEf]=useState({name:r.name,address:r.address,foundAt:r.foundAt||"",category:r.category,note:r.note||"",tags:(r.tags||[]).join("、")});
  const[addingVisit,setAddingVisit]=useState(false);
  const[newDishes,setNewDishes]=useState([{name:"",rating:0}]);
  const[newNote,setNewNote]=useState("");

  function saveEdit(){
    upd(r.id,{...ef,tags:ef.tags.split(/[,，、\s]+/).filter(Boolean)});setEditing(false);
  }
  function toggleStatus(){
    const newSt=r.status==="想去"?"已去":"想去";
    const visits=r.visits||[];
    if(newSt==="已去"&&visits.length===0)upd(r.id,{status:newSt,visits:[{id:Date.now(),date:new Date().toLocaleDateString("zh-CN"),dishes:[],note:""}]});
    else upd(r.id,{status:newSt});
  }
  function addVisit(){
    const v={id:Date.now(),date:new Date().toLocaleDateString("zh-CN"),dishes:newDishes.filter(d=>d.name.trim()),note:newNote};
    upd(r.id,{visits:[...(r.visits||[]),v]});
    setAddingVisit(false);setNewDishes([{name:"",rating:0}]);setNewNote("");
  }

  return(<main style={S.main}><div style={S.formCard}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
      <button style={S.backBtn} onClick={back}>← Back</button>
      <div style={{display:"flex",gap:8}}>
        <button style={S.smallBtn} onClick={()=>share(r)}>📤 分享</button>
        <button style={{...S.smallBtn,color:"#664",borderColor:"#2a1a1a"}} onClick={()=>{if(confirm(`删除「${r.name}」？`))del(r.id)}}>🗑️</button>
      </div>
    </div>

    {/* Banner */}
    <div style={{...S.detBanner,borderBottom:`1px solid ${color}30`,background:`linear-gradient(135deg,${color}14,transparent)`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <span style={{...S.badge,background:color+"22",color,fontSize:11}}>{r.category}</span>
          <h2 style={S.detName}>{r.name}</h2>
          <div style={{fontSize:11,color:"#334"}}>Added {r.createdAt}</div>
        </div>
        <span style={{...S.badge,fontSize:11,background:warn?"#f8717118":been?"#6ee7b718":"#ffffff08",
          color:warn?"#f87171":been?"#6ee7b7":"#556"}}>{warn?"避雷 ⚠️":been?"✓ 去过":"想去"}</span>
      </div>
    </div>

    {/* Info / Edit */}
    <div style={S.section}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={S.microLabel2}>INFO</span>
        <button style={S.editBtn} onClick={()=>{if(editing)saveEdit();else{setEf({name:r.name,address:r.address,foundAt:r.foundAt||"",category:r.category,note:r.note||"",tags:(r.tags||[]).join("、")});setEditing(true)}}}>
          {editing?"✓ 保存":"编辑"}</button>
      </div>
      {editing?(<div>
        <label style={S.label}>名称</label><input style={S.input} value={ef.name} onChange={e=>setEf({...ef,name:e.target.value})}/>
        <label style={S.label}>地址</label><input style={S.input} value={ef.address} onChange={e=>setEf({...ef,address:e.target.value})}/>
        <label style={S.label}>发现于</label><input style={S.input} value={ef.foundAt} onChange={e=>setEf({...ef,foundAt:e.target.value})}/>
        <label style={S.label}>分类</label>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
          {cats.map(c=><button key={c.name} style={{...S.chip,...(ef.category===c.name?{background:c.color,color:"#fff",borderColor:c.color}:{borderColor:c.color+"66",color:c.color})}}
            onClick={()=>setEf({...ef,category:c.name})}>{c.name}</button>)}
        </div>
        <label style={S.label}>备注</label><textarea style={{...S.input,minHeight:56,resize:"vertical"}} value={ef.note} onChange={e=>setEf({...ef,note:e.target.value})}/>
        <label style={S.label}>标签</label><input style={S.input} value={ef.tags} onChange={e=>setEf({...ef,tags:e.target.value})}/>
      </div>):(<div>
        <div style={S.infoRow}><span style={S.di}>📍</span><span style={S.dv}>{r.address}</span></div>
        {r.foundAt&&<div style={S.infoRow}><span style={S.di}>🔍</span><span style={S.dv}>发现于 {r.foundAt}</span></div>}
        {r.note&&<div style={S.infoRow}><span style={S.di}>✏️</span><span style={S.dv}>{r.note}</span></div>}
        {r.tags?.length>0&&<div style={{marginTop:6,display:"flex",gap:4,flexWrap:"wrap"}}>{r.tags.map(t=><span key={t} style={S.tag}>{t}</span>)}</div>}
      </div>)}
    </div>

    {/* Status */}
    <div style={{...S.section,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <button style={{...S.toggleBtn,color:been?"#6ee7b7":"#f0b429",borderColor:been?"#6ee7b730":"#f0b42930"}}
        onClick={toggleStatus}>{been?"↩ 改为想去":"✓ 标记去过"}</button>
      {been&&ar>0&&<div style={{fontSize:13,color:"#f0b429"}}>{"★".repeat(Math.round(ar))}{"☆".repeat(5-Math.round(ar))}<span style={{fontSize:10,color:"#334",marginLeft:4}}>均分</span></div>}
    </div>

    {/* Visits Timeline */}
    {been&&<div style={S.section}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={S.microLabel2}>打卡记录 ({(r.visits||[]).length}次)</span>
        <button style={S.editBtn} onClick={()=>setAddingVisit(!addingVisit)}>{addingVisit?"取消":"+ 再去一次"}</button>
      </div>
      {addingVisit&&<div style={{background:"#0c0c14",borderRadius:8,padding:12,marginBottom:12,border:"1px solid #1e1e30"}}>
        <div style={{fontSize:11,color:"#446",marginBottom:6}}>今天吃了什么？</div>
        {newDishes.map((d,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
          <input style={{...S.input,flex:1,padding:"7px 10px",fontSize:13}} placeholder="菜名"
            value={d.name} onChange={e=>{const c=[...newDishes];c[i]={...c[i],name:e.target.value};setNewDishes(c)}}/>
          <Stars value={d.rating} onChange={v=>{const c=[...newDishes];c[i]={...c[i],rating:v};setNewDishes(c)}} size={15}/>
        </div>)}
        <button style={{...S.chip,color:"#668",borderColor:"#20203a",marginBottom:8}} onClick={()=>setNewDishes([...newDishes,{name:"",rating:0}])}>+ 加一道</button>
        <textarea style={{...S.input,minHeight:44,resize:"vertical",fontSize:13,marginBottom:8}} placeholder="备注（可选）" value={newNote} onChange={e=>setNewNote(e.target.value)}/>
        <button style={{...S.btn,padding:"9px"}} className="press" onClick={addVisit}>保存这次打卡</button>
      </div>}
      {(r.visits||[]).slice().reverse().map(v=><div key={v.id} style={S.visitCard}>
        <div style={{fontSize:12,color:"#446",fontWeight:600,marginBottom:4}}>📅 {v.date}</div>
        {(v.dishes||[]).map((d,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
          <span style={{fontSize:13,color:"#9090a8"}}>{d.name}</span>
          {d.rating>0&&<span style={{fontSize:11,color:d.rating<=2?"#f87171":"#f0b429"}}>{"★".repeat(d.rating)}{"☆".repeat(5-d.rating)}</span>}
        </div>)}
        {v.note&&<div style={{fontSize:12,color:"#556",marginTop:4}}>{v.note}</div>}
      </div>)}
    </div>}

    {/* Navigate */}
    <button style={{...S.btn,display:"flex",alignItems:"center",justifyContent:"center",gap:6}} className="press"
      onClick={()=>setNavSheet(r)}>🗺️ 导航到这里</button>
  </div></main>);
}

/* ── AddView ───────────────────────────────────────── */
function AddView({form,setForm,cats,onSave,onBack}){
  return(<main style={S.main}><div style={S.formCard}>
    <button style={S.backBtn} onClick={onBack}>← Back</button>
    <h2 style={S.formTitle}>Add a spot</h2>
    <label style={S.label}>Name <span style={{color:"#f87171"}}>*</span></label>
    <input style={S.input} placeholder="餐厅名" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
    <label style={S.label}>Address <span style={{color:"#f87171"}}>*</span></label>
    <input style={S.input} placeholder="详细地址（导航用）" value={form.address} onChange={e=>setForm({...form,address:e.target.value})}/>
    <label style={S.label}>Spotted at</label>
    <input style={S.input} placeholder="在哪看到的" value={form.foundAt} onChange={e=>setForm({...form,foundAt:e.target.value})}/>
    <label style={S.label}>Category</label>
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
      {cats.map(c=><button key={c.name} style={{...S.chip,...(form.category===c.name?{background:c.color,color:"#fff",borderColor:c.color}:{borderColor:c.color+"66",color:c.color})}}
        onClick={()=>setForm({...form,category:c.name})}>{c.name}</button>)}
    </div>
    <label style={S.label}>Note</label>
    <textarea style={{...S.input,minHeight:56,resize:"vertical"}} placeholder="氛围、推荐菜…" value={form.note} onChange={e=>setForm({...form,note:e.target.value})}/>
    <label style={S.label}>Tags</label>
    <input style={S.input} placeholder="辣 宵夜 聚餐" value={form.tags} onChange={e=>setForm({...form,tags:e.target.value})}/>
    <button style={{...S.btn,opacity:form.name&&form.address?1:0.35}} disabled={!form.name||!form.address}
      onClick={onSave} className="press">Save ✓</button>
  </div></main>);
}

/* ── SettingsView ──────────────────────────────────── */
function SettingsView({cats,setCats,exportData,importData}){
  const[nn,setNn]=useState("");const[pc,setPc]=useState(COLORS[0]);const[err,setErr]=useState("");
  const fileRef=useRef();
  function doAdd(){
    const n=nn.trim();if(!n)return;
    if(cats.find(c=>c.name===n)){setErr("已有同名");return}
    setCats(p=>[...p,{name:n,color:pc}]);setNn("");setErr("");
  }
  return(<main style={S.main}><div style={S.formCard}>
    <h2 style={S.formTitle}>设置</h2>

    {/* Categories */}
    <div style={S.microLabel2}>菜系分类</div>
    <div style={{marginTop:8}}>
      {cats.map(c=><div key={c.name} style={S.settRow}>
        <span style={{...S.badge,background:c.color+"22",color:c.color,marginRight:8}}>{c.name}</span>
        <div style={{display:"flex",gap:3,flexWrap:"wrap",flex:1}}>
          {COLORS.map(col=><button key={col} style={{...S.swatch,background:col,outline:c.color===col?"2px solid #fff":"none",outlineOffset:2}}
            onClick={()=>setCats(p=>p.map(x=>x.name===c.name?{...x,color:col}:x))}/>)}
        </div>
        <button style={S.delBtn} onClick={()=>{if(cats.length<=1){setErr("至少一个");return}setCats(p=>p.filter(x=>x.name!==c.name))}}>✕</button>
      </div>)}
    </div>
    <div style={{...S.section,marginTop:12}}>
      <input style={S.input} placeholder="新分类名称" value={nn} onChange={e=>{setNn(e.target.value);setErr("")}} onKeyDown={e=>e.key==="Enter"&&doAdd()}/>
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}>
        {COLORS.map(col=><button key={col} style={{...S.swatch,background:col,outline:pc===col?"2px solid #fff":"none",outlineOffset:2}} onClick={()=>setPc(col)}/>)}
      </div>
      {err&&<div style={{fontSize:12,color:"#f87171",marginTop:6}}>{err}</div>}
      <button style={{...S.btn,opacity:nn.trim()?1:0.4,marginTop:10}} disabled={!nn.trim()} onClick={doAdd} className="press">+ 添加</button>
    </div>

    {/* Data */}
    <div style={{...S.microLabel2,marginTop:24}}>数据管理</div>
    <button style={{...S.btn,background:"#151f30",color:"#60a0e0",border:"1px solid #1e3050",marginTop:8}} onClick={exportData}>📥 导出备份 (JSON)</button>
    <button style={{...S.btn,background:"#1a1520",color:"#a080d0",border:"1px solid #2a1e40",marginTop:8}} onClick={()=>fileRef.current?.click()}>📤 导入恢复</button>
    <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
    <div style={{fontSize:11,color:"#223",marginTop:12,textAlign:"center"}}>定期导出，换手机不丢数据</div>
  </div></main>);
}

/* ── Styles ─────────────────────────────────────────── */
const S={
  root:{minHeight:"100vh",background:"#0c0c14",color:"#d0d0e0",paddingBottom:70,paddingTop:0},
  header:{background:"#0e0e1a",borderBottom:"1px solid #16162a",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)"},
  headerIn:{maxWidth:600,margin:"0 auto",padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"},
  logoT:{fontSize:15,fontWeight:700,letterSpacing:-0.3,color:"#f0f0f8"},
  logoS:{fontSize:10,color:"#334",marginTop:1},
  addBtn:{background:"#fff",color:"#0c0c14",border:"none",borderRadius:16,padding:"7px 16px",fontSize:13,fontWeight:700,cursor:"pointer"},
  main:{maxWidth:600,margin:"0 auto",padding:"14px 14px 20px"},
  searchInput:{width:"100%",background:"#12121c",border:"1px solid #1c1c2e",borderRadius:10,color:"#d0d0e0",padding:"9px 14px",fontSize:14,boxSizing:"border-box",marginBottom:12},
  filterRow:{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10},
  chip:{background:"transparent",border:"1px solid #1c1c2e",borderRadius:12,padding:"4px 10px",fontSize:11,cursor:"pointer",color:"#446"},
  chipA:{background:"#fff",borderColor:"#fff",color:"#0c0c14",fontWeight:600},
  chipA2:{background:"#1e1e30",borderColor:"#2a2a44",color:"#a0a0c0"},
  microLabel:{fontSize:10,color:"#334",letterSpacing:0.5,textTransform:"uppercase"},
  microLabel2:{fontSize:10,color:"#334",letterSpacing:0.8,textTransform:"uppercase",marginTop:14,marginBottom:6},
  groupHdr:{width:"100%",background:"#10101c",border:"none",borderRadius:8,padding:"9px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",marginBottom:4,marginTop:8},
  empty:{textAlign:"center",padding:"50px 0"},
  card:{background:"#10101a",border:"1px solid #18182a",borderRadius:12,overflow:"hidden"},
  cardBody:{padding:"12px 14px 8px",cursor:"pointer"},
  cardRow:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4},
  cardName:{fontSize:15,fontWeight:600,color:"#f0f0f8",letterSpacing:-0.2},
  cardAddr:{fontSize:12,color:"#33344a",marginBottom:2},
  badge:{fontSize:10,padding:"2px 8px",borderRadius:8,fontWeight:700,letterSpacing:0.2,flexShrink:0},
  cardActs:{display:"flex",alignItems:"center",gap:5,padding:"8px 14px",borderTop:"1px solid #14142a"},
  actBtn:{background:"transparent",border:"1px solid",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer"},
  navBtn:{background:"#1a1a2c",color:"#668",border:"1px solid #20203a",borderRadius:8,padding:"5px 12px",fontSize:11,cursor:"pointer",fontWeight:600},
  formCard:{background:"#0f0f1a",border:"1px solid #18182a",borderRadius:14,padding:"20px 18px"},
  backBtn:{background:"transparent",border:"none",color:"#446",fontSize:13,cursor:"pointer",padding:0,marginBottom:10},
  formTitle:{fontSize:19,fontWeight:700,color:"#f0f0f8",margin:"0 0 4px",letterSpacing:-0.3},
  label:{display:"block",fontSize:10,color:"#446",marginBottom:5,marginTop:12,letterSpacing:0.8,textTransform:"uppercase"},
  input:{width:"100%",background:"#0c0c14",border:"1px solid #1c1c2e",borderRadius:8,color:"#d0d0e0",padding:"10px 12px",fontSize:14,boxSizing:"border-box"},
  btn:{width:"100%",background:"#fff",color:"#0c0c14",border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer",marginTop:14},
  smallBtn:{background:"transparent",border:"1px solid #20203a",color:"#446",borderRadius:8,padding:"5px 10px",fontSize:12,cursor:"pointer"},
  editBtn:{background:"transparent",border:"1px solid #1c1c2e",color:"#446",borderRadius:6,padding:"3px 9px",fontSize:11,cursor:"pointer"},
  detBanner:{borderRadius:10,padding:"14px",marginBottom:10,marginTop:10},
  detName:{fontSize:20,fontWeight:800,margin:"5px 0 2px",letterSpacing:-0.5,color:"#f0f0f8"},
  section:{background:"#0c0c14",borderRadius:10,padding:"12px 14px",marginBottom:8,border:"1px solid #18182a"},
  infoRow:{display:"flex",gap:8,marginBottom:5,alignItems:"flex-start"},
  di:{fontSize:13,flexShrink:0,paddingTop:1},
  dv:{fontSize:13,color:"#7070a0",lineHeight:1.5},
  tag:{background:"#14142a",color:"#446",fontSize:10,padding:"2px 7px",borderRadius:6,border:"1px solid #1c1c30"},
  toggleBtn:{background:"transparent",border:"1px solid",borderRadius:8,padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:600},
  visitCard:{background:"#0e0e18",borderRadius:8,padding:"10px 12px",marginBottom:6,border:"1px solid #16162a"},
  tabBar:{position:"fixed",bottom:0,left:0,right:0,background:"#090910",borderTop:"1px solid #14142a",display:"flex",justifyContent:"space-around",padding:"6px 0",paddingBottom:10,zIndex:200},
  tabBtn:{background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",color:"#334",padding:"4px 12px",borderRadius:8},
  tabBtnA:{color:"#fff"},
  settRow:{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #141428",gap:6,flexWrap:"wrap"},
  swatch:{width:16,height:16,borderRadius:4,border:"none",cursor:"pointer",padding:0,flexShrink:0},
  delBtn:{background:"transparent",border:"1px solid #201818",color:"#443",borderRadius:6,padding:"3px 7px",fontSize:11,cursor:"pointer"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
