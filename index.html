@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700;9..40,800&family=Noto+Sans+SC:wght@400;700&display=swap');

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

const DEF_CATS=[
  {name:"川菜",color:"#e85d26"},{name:"粤菜",color:"#c8973a"},{name:"日料",color:"#5f8fcc"},
  {name:"烤肉",color:"#b5451b"},{name:"火锅",color:"#d13b2a"},{name:"面食",color:"#c8843a"},
  {name:"其他",color:"#7a7a8a"}];
const COLORS=["#e85d26","#c8973a","#5f8fcc","#b5451b","#d13b2a","#c8843a","#7a7a8a","#4a9e6e","#8a5ccc","#cc5c8a","#6ab0a0","#a0886a","#5588aa","#9a7040"];
const MODES=[{id:"driving",label:"开车",icon:"🚗"},{id:"transit",label:"公交",icon:"🚌"},{id:"walking",label:"步行",icon:"🚶"},{id:"bicycling",label:"骑行",icon:"🚴"}];
const BAIDU_M={driving:"driving",transit:"transit",walking:"walking",bicycling:"riding"};
const AMAP_M={driving:"car",transit:"bus",walking:"walk",bicycling:"ride"};
const VER="2.1";

/* ── Map openers (APP first, web fallback) ─────────── */
function tryOpen(appUrl,webUrl){
  let opened=false;
  const onBlur=()=>{opened=true};
  window.addEventListener('blur',onBlur,{once:true});
  window.location.href=appUrl;
  setTimeout(()=>{
    window.removeEventListener('blur',onBlur);
    if(!opened)window.open(webUrl,'_blank');
  },1500);
}
function openBaidu(r,mode){
  const d=encodeURIComponent(r.name+" "+r.address);
  const o=r.foundAt?encodeURIComponent(r.foundAt):"";
  const app=`baidumap://map/direction?destination=name:${d}&mode=${BAIDU_M[mode]||"driving"}&src=webapp.withfriends${o?`&origin=name:${o}`:""}`;
  const web=`https://api.map.baidu.com/direction?origin=${o||encodeURIComponent("我的位置")}&destination=${d}&mode=${BAIDU_M[mode]||"driving"}&output=html&src=webapp.withfriends`;
  tryOpen(app,web);
}
function openAmap(r,mode){
  const d=encodeURIComponent(r.name);
  const app=`androidamap://navi?sourceApplication=withfriends&dname=${d}&dev=0`;
  const web=`https://uri.amap.com/navigation?to=,,${encodeURIComponent(r.name+" "+r.address)}&mode=${AMAP_M[mode]||"car"}&callnative=1&src=webapp.withfriends`;
  tryOpen(app,web);
}

/* ── Helpers ───────────────────────────────────────── */
function catColor(cats,n){return(cats.find(c=>c.name===n)||{}).color||"#7a7a8a"}
function avgRating(r){
  const all=(r.visits||[]).flatMap(v=>(v.dishes||[]).map(d=>d.rating).filter(x=>x>0));
  return all.length?all.reduce((a,b)=>a+b,0)/all.length:0;
}
function lastVisit(r){const v=r.visits||[];return v.length?v[v.length-1].date:null}
function allDishNames(r){return(r.visits||[]).flatMap(v=>(v.dishes||[]).map(d=>d.name)).join(" ")}
function matchSearch(r,q){
  if(!q)return true;
  return[r.name,r.address,r.note||"",r.foundAt||"",r.area||"",(r.tags||[]).join(" "),allDishNames(r)].some(s=>s.includes(q));
}
function sortList(list,by){
  const c=[...list];
  if(by==="rating")c.sort((a,b)=>avgRating(b)-avgRating(a));
  else if(by==="recent")c.sort((a,b)=>(lastVisit(b)||"").localeCompare(lastVisit(a)||""));
  else c.sort((a,b)=>b.id-a.id);
  return c;
}

/* ── Logo ──────────────────────────────────────────── */
function Logo({size=36}){return(
<svg width={size} height={size} viewBox="0 0 36 36" fill="none">
<circle cx="18" cy="21" r="10" stroke="#ffffff40" strokeWidth="1.5"/>
<path d="M13 11 Q14 9 13 7" stroke="#f0b429" strokeWidth="1.5" strokeLinecap="round"/>
<path d="M18 10 Q19 8 18 6" stroke="#f0b429" strokeWidth="1.5" strokeLinecap="round"/>
<path d="M23 11 Q24 9 23 7" stroke="#f0b429" strokeWidth="1.5" strokeLinecap="round"/>
<line x1="12.5" y1="17" x2="12.5" y2="25" stroke="#ffffff80" strokeWidth="1.4" strokeLinecap="round"/>
<line x1="11.5" y1="17" x2="11.5" y2="20" stroke="#ffffff50" strokeWidth="1.2" strokeLinecap="round"/>
<line x1="13.5" y1="17" x2="13.5" y2="20" stroke="#ffffff50" strokeWidth="1.2" strokeLinecap="round"/>
<ellipse cx="23.5" cy="17" rx="1.5" ry="2" stroke="#ffffff80" strokeWidth="1.3"/>
<line x1="23.5" y1="19" x2="23.5" y2="25" stroke="#ffffff80" strokeWidth="1.4" strokeLinecap="round"/>
<path d="M17.5 22 C17.5 21 16 20 16 21.5 C16 23 17.5 24 17.5 24 C17.5 24 19 23 19 21.5 C19 20 17.5 21 17.5 22Z" fill="#f87171"/>
</svg>)}

/* ── Stars ─────────────────────────────────────────── */
function Stars({value=0,onChange,size=17,readonly=false}){
  const[h,setH]=useState(0);
  return(<div style={{display:"flex",gap:1}}>
    {[1,2,3,4,5].map(n=>(
      <button key={n} style={{background:"none",border:"none",cursor:readonly?"default":"pointer",padding:"2px",fontSize:size,color:(h||value)>=n?"#f0b429":"#252538",lineHeight:1}}
        onMouseEnter={()=>!readonly&&setH(n)} onMouseLeave={()=>setH(0)}
        onClick={()=>!readonly&&onChange?.(value===n?0:n)}>★</button>
    ))}
  </div>);
}

/* ── SwipeCard ─────────────────────────────────────── */
function SwipeCard({onDelete,children}){
  const[ox,setOx]=useState(0);const[sw,setSw]=useState(false);
  const sx=useRef(0);const sy=useRef(0);const hz=useRef(false);const T=80;
  const onTS=e=>{sx.current=e.touches[0].clientX;sy.current=e.touches[0].clientY;hz.current=false;setSw(false)};
  const onTM=e=>{
    const dx=e.touches[0].clientX-sx.current,dy=e.touches[0].clientY-sy.current;
    if(!hz.current&&Math.abs(dy)>Math.abs(dx))return;
    if(!hz.current&&sx.current<40)return;
    if(!hz.current&&Math.abs(dx)>6)hz.current=true;
    if(!hz.current)return;
    e.preventDefault();setOx(Math.min(0,dx));setSw(true);
  };
  const onTE=()=>{setOx(ox<-T?-T:0);setSw(false)};
  const revealed=ox<=-T;
  return(<div style={{position:"relative",overflow:"hidden",borderRadius:12,marginBottom:2}}>
    <div style={{position:"absolute",right:0,top:0,bottom:0,width:80,background:"#d13b2a",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"0 12px 12px 0"}}>
      <button style={{background:"none",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}
        onClick={()=>{if(confirm("删除这家？"))onDelete()}}><span style={{fontSize:16}}>🗑️</span><span>删除</span></button>
    </div>
    <div style={{transform:`translateX(${ox}px)`,transition:sw?"none":"transform 0.25s cubic-bezier(.4,0,.2,1)",position:"relative",zIndex:1}}
      onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
      onClick={revealed?()=>setOx(0):undefined}>{children}</div>
  </div>);
}

/* ── BottomSheet ───────────────────────────────────── */
function BottomSheet({open,onClose,title,children}){
  if(!open)return null;
  return(<>
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"#000a",zIndex:300}}/>
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#11111b",borderRadius:"16px 16px 0 0",
      padding:"20px 18px 34px",zIndex:301,maxHeight:"75vh",overflowY:"auto",
      animation:"sheetUp 0.22s ease-out"}}>
      <style>{`@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}`}</style>
      <div style={{width:36,height:4,borderRadius:2,background:"#2a2a44",margin:"0 auto 14px"}}/>
      {title&&<div style={{fontSize:14,fontWeight:700,color:"#f0f0f8",marginBottom:14}}>{title}</div>}
      {children}
    </div>
  </>);
}

/* ── NavSheet ──────────────────────────────────────── */
function NavSheet({r,mode,setMode,onClose}){
  return(<div>
    <div style={{fontSize:15,fontWeight:700,color:"#f0f0f8",marginBottom:3}}>{r.name}</div>
    <div style={{fontSize:12,color:"#446",marginBottom:16}}>📍 {r.address}</div>
    <div style={S.microLabel}>出行方式</div>
    <div style={{display:"flex",gap:6,margin:"8px 0 16px",flexWrap:"wrap"}}>
      {MODES.map(m=><button key={m.id} style={{...S.chip,...(mode===m.id?{background:"#fff",color:"#0c0c14",borderColor:"#fff"}:{})}}
        onClick={()=>setMode(m.id)}>{m.icon} {m.label}</button>)}
    </div>
    <button style={{...S.btn,background:"#151f30",color:"#60a0e0",border:"1px solid #1e3050",marginTop:0}}
      onClick={()=>{openBaidu(r,mode);onClose()}}>🔵 百度地图</button>
    <button style={{...S.btn,background:"#152015",color:"#60c060",border:"1px solid #1e401e",marginTop:8}}
      onClick={()=>{openAmap(r,mode);onClose()}}>🟢 高德地图</button>
  </div>);
}

/* ── Visit Sheet (首次 + 再去一次) ─────────────────── */
function VisitSheet({onSave,onClose}){
  const[dishes,setDishes]=useState([{name:"",rating:0}]);
  const[note,setNote]=useState("");
  function save(){
    const valid=dishes.filter(d=>d.name.trim());
    onSave({id:Date.now(),date:new Date().toLocaleDateString("zh-CN"),dishes:valid,note});
  }
  return(<div>
    <div style={S.microLabel}>这次点了什么？</div>
    <div style={{marginTop:8}}>
      {dishes.map((d,i)=>(
        <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
          <input style={{...S.input,flex:1,padding:"7px 10px",fontSize:13}} placeholder="菜名"
            value={d.name} onChange={e=>{const c=[...dishes];c[i]={...c[i],name:e.target.value};setDishes(c)}}/>
          <Stars value={d.rating} onChange={v=>{const c=[...dishes];c[i]={...c[i],rating:v};setDishes(c)}} size={16}/>
          {dishes.length>1&&<button style={{background:"none",border:"none",color:"#446",cursor:"pointer",fontSize:14,padding:"0 2px"}}
            onClick={()=>setDishes(dishes.filter((_,j)=>j!==i))}>✕</button>}
        </div>
      ))}
      <button style={{...S.chip,color:"#668",borderColor:"#20203a"}} onClick={()=>setDishes([...dishes,{name:"",rating:0}])}>+ 加一道</button>
    </div>
    <textarea style={{...S.input,minHeight:44,resize:"vertical",fontSize:13,marginTop:10}} placeholder="备注（可选）" value={note} onChange={e=>setNote(e.target.value)}/>
    <div style={{display:"flex",gap:8,marginTop:12}}>
      <button style={{...S.btn,background:"transparent",color:"#446",border:"1px solid #20203a",marginTop:0,flex:1}} onClick={onClose}>跳过</button>
      <button style={{...S.btn,marginTop:0,flex:2}} className="press" onClick={save}>保存打卡</button>
    </div>
  </div>);
}

/* ── Main App ──────────────────────────────────────── */
function App(){
  const[rs,setRs]=useState(()=>{try{return JSON.parse(localStorage.getItem("wf4_r"))||[]}catch{return[]}});
  const[cats,setCats]=useState(()=>{try{return JSON.parse(localStorage.getItem("wf4_c"))||DEF_CATS}catch{return DEF_CATS}});
  const[tab,setTab]=useState(0);
  const[view,setView]=useState(null);
  const[sel,setSel]=useState(null);
  const[search,setSearch]=useState("");
  const[fCat,setFCat]=useState("全部");
  const[fArea,setFArea]=useState("全部");
  const[sortBy,setSortBy]=useState("added");
  const[groupBy,setGroupBy]=useState("none");
  const[collapsed,setCollapsed]=useState({});
  const[navSheet,setNavSheet]=useState(null);
  const[navMode,setNavMode]=useState("transit");
  const[visitSheet,setVisitSheet]=useState(null);// {id, isFirst}
  const[form,setForm]=useState({name:"",address:"",area:"",foundAt:"",category:"",note:"",tags:""});

  useEffect(()=>{if(!form.category&&cats.length)setForm(f=>({...f,category:cats[0].name}))},[cats]);
  useEffect(()=>{try{localStorage.setItem("wf4_r",JSON.stringify(rs))}catch{}},[rs]);
  useEffect(()=>{try{localStorage.setItem("wf4_c",JSON.stringify(cats))}catch{}},[cats]);

  // Reset filters when switching tabs
  useEffect(()=>{setFCat("全部");setFArea("全部");setCollapsed({});},[tab]);

  // All unique areas
  const allAreas=[...new Set(rs.map(r=>r.area).filter(Boolean))];

  const statusFilter=tab===1?"想去":tab===2?"已去":null;
  const isWarn=r=>r.status==="已去"&&avgRating(r)>0&&avgRating(r)<=2;
  const filtered=rs.filter(r=>{
    if(statusFilter&&r.status!==statusFilter)return false;
    // "只看避雷" stored as fCat==="__warn__"
    if(fCat==="__warn__"){if(!isWarn(r))return false;}
    else if(fCat!=="全部"&&r.category!==fCat)return false;
    if(fArea!=="全部"&&r.area!==fArea)return false;
    return matchSearch(r,search);
  });
  const sorted=sortList(filtered,sortBy);

  function buildGroups(list){
    if(groupBy==="none")return[{key:null,items:list}];
    // In 去过 tab, only allow category grouping
    const key=groupBy==="category"?"category":"area";
    const map={};
    list.forEach(r=>{const k=(key==="category"?r.category:r.area)||"未分类";if(!map[k])map[k]=[];map[k].push(r)});
    return Object.entries(map).filter(([,v])=>v.length>0).map(([k,items])=>({key:k,items}));
  }
  const groups=buildGroups(sorted);

  function add(){
    if(!form.name.trim()||!form.address.trim())return;
    const cat=form.category||cats[0]?.name||"其他";
    setRs(p=>[{id:Date.now(),...form,category:cat,status:"想去",visits:[],
      tags:form.tags.split(/[,，\s]+/).filter(Boolean),createdAt:new Date().toLocaleDateString("zh-CN")},...p]);
    setForm({name:"",address:"",area:"",foundAt:"",category:cat,note:"",tags:""});
    setView(null);
  }
  function del(id){
    setRs(p=>p.filter(r=>r.id!==id));
    if(sel?.id===id){setView(null);setSel(null);}
  }
  function upd(id,patch){
    setRs(p=>p.map(r=>r.id===id?{...r,...patch}:r));
    // Always sync sel to avoid stale detail view
    setSel(s=>s?.id===id?{...s,...patch}:s);
  }
  function openDetail(r){setSel(r);setView("detail")}
  function back(){setView(null);setSel(null)}

  function handleToggleStatus(id,currentStatus){
    const newSt=currentStatus==="想去"?"已去":"想去";
    if(newSt==="已去"){
      upd(id,{status:newSt});
      setVisitSheet({id,isFirst:true});
    } else {
      upd(id,{status:newSt});
    }
  }

  function saveVisit(id,visit){
    // Only save if at least one dish has a name
    const dishes=visit.dishes.filter(d=>d.name.trim());
    const v={...visit,dishes};
    upd(id,{visits:[...(rs.find(r=>r.id===id)?.visits||[]),v]});
    setVisitSheet(null);
  }

  function share(r){
    const ar=avgRating(r);
    const dishes=(r.visits||[]).flatMap(v=>v.dishes||[]).filter(d=>d.rating>=4).map(d=>d.name).slice(0,5).join("、");
    const txt=`📍 ${r.name}\n${r.address}${r.area?` (${r.area})`:""}${ar?`\n${["","★","★★","★★★","★★★★","★★★★★"][Math.round(ar)]}`:""}${dishes?`\n推荐：${dishes}`:""}`;
    if(navigator.share)navigator.share({title:r.name,text:txt}).catch(()=>navigator.clipboard?.writeText(txt)||alert(txt));
    else{navigator.clipboard?.writeText(txt).then(()=>alert("已复制")).catch(()=>alert(txt))}
  }

  function exportData(){
    const d=JSON.stringify({restaurants:rs,categories:cats,exportedAt:new Date().toISOString()},null,2);
    const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);
    const a=document.createElement("a");a.href=u;a.download="withfriends_backup.json";a.click();URL.revokeObjectURL(u);
  }
  function importData(e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.restaurants){setRs(d.restaurants);}
        if(d.categories){setCats(d.categories);}
        alert(`导入成功！${d.restaurants?.length||0} 家餐厅`);
      }catch{alert("文件格式错误，请选择正确的备份文件")}
    };
    reader.readAsText(f);
    e.target.value="";
  }

  const wantN=rs.filter(r=>r.status==="想去").length;
  const beenN=rs.filter(r=>r.status==="已去").length;
  const totalVisits=rs.reduce((s,r)=>s+(r.visits||[]).length,0);

  // Sync sel when rs changes (edit, visit add, etc.)
  useEffect(()=>{
    if(sel)setSel(rs.find(r=>r.id===sel.id)||null);
  },[rs]);

  return(<div style={S.root}>
    <header style={S.header}><div style={S.headerIn}>
      <div style={{display:"flex",alignItems:"center"}}>
        <Logo/><div style={{marginLeft:10}}>
          <div style={S.logoT}>withfriends</div>
          <div style={S.logoS}>{wantN} to visit · {beenN} been</div>
        </div>
      </div>
      <button style={S.addBtn} className="press" onClick={()=>{
        setForm({name:"",address:"",area:"",foundAt:"",category:cats[0]?.name||"",note:"",tags:""});
        setView("add");
      }}>+ Add</button>
    </div></header>

    {view==="add"&&<AddView form={form} setForm={setForm} cats={cats} allAreas={allAreas} onSave={add} onBack={back}/>}
    {view==="detail"&&sel&&(
      <DetailView r={sel} cats={cats} upd={upd} del={del} back={back} share={share}
        setNavSheet={setNavSheet} navMode={navMode}
        onToggleStatus={()=>handleToggleStatus(sel.id,sel.status)}
        onAddVisit={(visit)=>saveVisit(sel.id,visit)}/>
    )}
    {view===null&&tab<3&&(
      <ListView tab={tab} search={search} setSearch={setSearch}
        fCat={fCat} setFCat={setFCat} fArea={fArea} setFArea={setFArea}
        allAreas={allAreas} cats={cats}
        sortBy={sortBy} setSortBy={setSortBy}
        groupBy={groupBy} setGroupBy={setGroupBy}
        groups={groups} collapsed={collapsed} setCollapsed={setCollapsed}
        openDetail={openDetail} upd={upd} del={del}
        setNavSheet={setNavSheet}
        onToggleStatus={handleToggleStatus}/>
    )}
    {view===null&&tab===3&&(
      <SettingsView cats={cats} setCats={setCats} exportData={exportData} importData={importData}
        stats={{restaurants:rs.length,visits:totalVisits}}/>
    )}

    {/* Nav Sheet */}
    <BottomSheet open={!!navSheet} onClose={()=>setNavSheet(null)}>
      {navSheet&&<NavSheet r={navSheet} mode={navMode} setMode={setNavMode} onClose={()=>setNavSheet(null)}/>}
    </BottomSheet>

    {/* Visit Sheet */}
    <BottomSheet open={!!visitSheet} onClose={()=>setVisitSheet(null)}
      title={visitSheet?.isFirst?"记录这次打卡":"再去一次 · 记录菜品"}>
      {visitSheet&&<VisitSheet onSave={v=>saveVisit(visitSheet.id,v)} onClose={()=>setVisitSheet(null)}/>}
    </BottomSheet>

    <nav style={S.tabBar}>
      {[{l:"全部",i:"🏠"},{l:"想去",i:"📌"},{l:"去过",i:"✓"},{l:"设置",i:"⚙️"}].map((t,i)=>(
        <button key={i} style={{...S.tabBtn,...(tab===i?S.tabBtnA:{})}}
          onClick={()=>{setTab(i);if(view!=="add"&&view!=="detail")setView(null);}}>
          <span style={{fontSize:16,lineHeight:1}}>{t.i}</span>
          <span style={{fontSize:10,marginTop:2}}>{t.l}</span>
        </button>
      ))}
    </nav>
  </div>);
}

/* ── ListView ──────────────────────────────────────── */
function ListView({tab,search,setSearch,fCat,setFCat,fArea,setFArea,allAreas,cats,sortBy,setSortBy,groupBy,setGroupBy,groups,collapsed,setCollapsed,openDetail,upd,del,setNavSheet,onToggleStatus}){
  // In 去过 tab, groupBy options exclude "status"
  const groupOpts=tab===2
    ?[["none","—"],["category","菜系"],["area","区域"]]
    :[["none","—"],["category","菜系"],["status","状态"],["area","区域"]];

  return(<main style={S.main}>
    <input style={S.searchInput} placeholder="搜餐厅、地址、菜品、区域…" value={search} onChange={e=>setSearch(e.target.value)}/>

    {/* Cat filter */}
    <div style={S.filterRow}>
      {["全部",...cats.map(c=>c.name)].map(c=>{
        const col=c!=="全部"?catColor(cats,c):null;
        return<button key={c} style={{...S.chip,...(fCat===c?S.chipA:{}),
          ...(c!=="全部"&&fCat!==c?{borderColor:col+"44",color:col}:{})}}
          onClick={()=>setFCat(c)}>{c}</button>
      })}
      {tab===2&&<button style={{...S.chip,...(fCat==="__warn__"?{background:"#f8717122",color:"#f87171",borderColor:"#f8717144"}:{color:"#f87171",borderColor:"#f8717133"})}}
        onClick={()=>setFCat(fCat==="__warn__"?"全部":"__warn__")}>⚠️ 避雷</button>}
    </div>

    {/* Area filter */}
    {allAreas.length>0&&<div style={{...S.filterRow,marginTop:-4}}>
      {["全部",...allAreas].map(a=>(
        <button key={a} style={{...S.chip,...(fArea===a?S.chipA2:{color:"#558",borderColor:"#1e1e30"})}}
          onClick={()=>setFArea(a)}>📍 {a}</button>
      ))}
    </div>}

    {/* Sort + Group */}
    <div style={{display:"flex",gap:12,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:4}}>
        <span style={S.microLabel}>排序</span>
        {[["added","时间"],["rating","评分"],["recent","最近"]].map(([v,l])=>
          <button key={v} style={{...S.chip,...(sortBy===v?S.chipA2:{})}} onClick={()=>setSortBy(v)}>{l}</button>)}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:4}}>
        <span style={S.microLabel}>归类</span>
        {groupOpts.map(([v,l])=>
          <button key={v} style={{...S.chip,...(groupBy===v?S.chipA2:{})}} onClick={()=>setGroupBy(v)}>{l}</button>)}
      </div>
    </div>

    {groups.every(g=>g.items.length===0)?(
      <div style={S.empty}><div style={{fontSize:36,marginBottom:10}}>🍽️</div>
        <div style={{color:"#33334a",fontSize:13}}>No spots here</div></div>
    ):(
      <div style={{display:"flex",flexDirection:"column"}}>
        {groups.map(({key,items})=>items.length===0?null:<div key={key||"all"}>
          {key!==null&&<button style={{...S.groupHdr,borderLeft:`3px solid ${groupBy==="category"?catColor(cats,key):"#446"}`}}
            onClick={()=>setCollapsed(p=>({...p,[key]:!p[key]}))}>
            <span style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:13,fontWeight:600,color:"#d0d0e0"}}>{key}</span>
              <span style={{fontSize:11,color:"#446"}}>{items.length}</span>
            </span>
            <span style={{fontSize:12,color:"#334",display:"inline-block",
              transform:collapsed[key]?"rotate(-90deg)":"rotate(0)",transition:"transform 0.2s"}}>▾</span>
          </button>}
          {!collapsed[key]&&items.map(r=>(
            <SwipeCard key={r.id} onDelete={()=>del(r.id)}>
              <Card r={r} cats={cats} onOpen={()=>openDetail(r)} onNav={()=>setNavSheet(r)}
                onToggle={()=>onToggleStatus(r.id,r.status)}/>
            </SwipeCard>
          ))}
        </div>)}
      </div>
    )}
  </main>);
}

/* ── Card ──────────────────────────────────────────── */
function Card({r,cats,onOpen,onNav,onToggle}){
  const been=r.status==="已去";const ar=avgRating(r);const warn=been&&ar>0&&ar<=2;
  const accent=warn?"#f87171":been?"#6ee7b7":catColor(cats,r.category);
  const vc=(r.visits||[]).length;const lv=lastVisit(r);
  return(<div style={{...S.card,borderLeft:`3px solid ${accent}44`}}>
    <div style={S.cardBody} onClick={onOpen}>
      <div style={S.cardRow}>
        <span style={S.cardName}>{r.name}</span>
        <span style={{...S.badge,background:warn?"#f8717118":been?"#6ee7b718":"#ffffff08",
          color:warn?"#f87171":been?"#6ee7b7":"#556"}}>
          {warn?"避雷 ⚠️":been?`✓ ${vc}次`:"想去"}</span>
      </div>
      <div style={S.cardAddr}>📍 {r.address}{r.area&&<span style={{color:"#334",marginLeft:5}}>· {r.area}</span>}</div>
      {been&&ar>0&&<div style={{fontSize:11,color:"#f0b429",letterSpacing:1,marginTop:2}}>
        {"★".repeat(Math.round(ar))}{"☆".repeat(5-Math.round(ar))}
        {lv&&<span style={{color:"#334",marginLeft:6,fontSize:10}}>最近 {lv}</span>}
      </div>}
    </div>
    <div style={S.cardActs}>
      <button style={{...S.actBtn,color:been?"#6ee7b7":"#f0b429",borderColor:been?"#6ee7b722":"#f0b42922"}}
        onClick={e=>{e.stopPropagation();onToggle()}}>{been?"↩ 想去":"✓ 去了"}</button>
      <div style={{flex:1}}/>
      <button style={S.navBtn} onClick={e=>{e.stopPropagation();onNav()}}>导航 →</button>
    </div>
  </div>);
}

/* ── DetailView ────────────────────────────────────── */
function DetailView({r,cats,upd,del,back,share,setNavSheet,navMode,onToggleStatus,onAddVisit}){
  const color=catColor(cats,r.category)||"#7a7a8a";
  const been=r.status==="已去";const ar=avgRating(r);const warn=been&&ar>0&&ar<=2;
  const[editing,setEditing]=useState(false);
  const[ef,setEf]=useState(null);
  const[addingVisit,setAddingVisit]=useState(false);

  function startEdit(){
    setEf({name:r.name,address:r.address,area:r.area||"",foundAt:r.foundAt||"",
      category:r.category,note:r.note||"",tags:(r.tags||[]).join("、")});
    setEditing(true);
  }
  function saveEdit(){
    upd(r.id,{...ef,tags:ef.tags.split(/[,，、\s]+/).filter(Boolean)});
    setEditing(false);setEf(null);
  }

  return(<main style={S.main}><div style={S.formCard}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
      <button style={S.backBtn} onClick={back}>← Back</button>
      <div style={{display:"flex",gap:8}}>
        <button style={S.smallBtn} onClick={()=>share(r)}>📤</button>
        <button style={{...S.smallBtn,color:"#664",borderColor:"#2a1a1a"}}
          onClick={()=>{if(confirm(`删除「${r.name}」？`))del(r.id)}}>🗑️</button>
      </div>
    </div>

    {/* Banner */}
    <div style={{...S.detBanner,borderBottom:`1px solid ${color}30`,background:`linear-gradient(135deg,${color}14,transparent)`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <span style={{...S.badge,background:color+"22",color,fontSize:11}}>{r.category}</span>
          <h2 style={S.detName}>{r.name}</h2>
          <div style={{fontSize:11,color:"#334"}}>Added {r.createdAt}</div>
        </div>
        <span style={{...S.badge,fontSize:11,marginLeft:8,background:warn?"#f8717118":been?"#6ee7b718":"#ffffff08",
          color:warn?"#f87171":been?"#6ee7b7":"#556"}}>
          {warn?"避雷 ⚠️":been?`✓ ${(r.visits||[]).length}次`:"想去"}</span>
      </div>
    </div>

    {/* Info / Edit */}
    <div style={S.section}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={S.microLabel}>INFO</span>
        <button style={S.editBtn} onClick={editing?saveEdit:startEdit}>{editing?"✓ 保存":"编辑"}</button>
      </div>
      {editing&&ef?(<div>
        <label style={S.label}>名称</label>
        <input style={S.input} value={ef.name} onChange={e=>setEf({...ef,name:e.target.value})}/>
        <label style={S.label}>地址</label>
        <input style={S.input} value={ef.address} onChange={e=>setEf({...ef,address:e.target.value})}/>
        <label style={S.label}>区域（地铁站/商圈）</label>
        <input style={S.input} placeholder="例：国贸、三里屯" value={ef.area} onChange={e=>setEf({...ef,area:e.target.value})}/>
        <label style={S.label}>发现于</label>
        <input style={S.input} value={ef.foundAt} onChange={e=>setEf({...ef,foundAt:e.target.value})}/>
        <label style={S.label}>分类</label>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
          {cats.map(c=><button key={c.name} style={{...S.chip,...(ef.category===c.name?{background:c.color,color:"#fff",borderColor:c.color}:{borderColor:c.color+"66",color:c.color})}}
            onClick={()=>setEf({...ef,category:c.name})}>{c.name}</button>)}
        </div>
        <label style={S.label}>备注</label>
        <textarea style={{...S.input,minHeight:56,resize:"vertical"}} value={ef.note} onChange={e=>setEf({...ef,note:e.target.value})}/>
        <label style={S.label}>标签</label>
        <input style={S.input} value={ef.tags} onChange={e=>setEf({...ef,tags:e.target.value})}/>
      </div>):(<div>
        <div style={S.infoRow}><span style={S.di}>📍</span><span style={S.dv}>{r.address}{r.area&&<span style={{color:"#446"}}> · {r.area}</span>}</span></div>
        {r.foundAt&&<div style={S.infoRow}><span style={S.di}>🔍</span><span style={S.dv}>发现于 {r.foundAt}</span></div>}
        {r.note&&<div style={S.infoRow}><span style={S.di}>✏️</span><span style={S.dv}>{r.note}</span></div>}
        {r.tags?.length>0&&<div style={{marginTop:6,display:"flex",gap:4,flexWrap:"wrap"}}>
          {r.tags.map(t=><span key={t} style={S.tag}>{t}</span>)}</div>}
      </div>)}
    </div>

    {/* Status + Rating */}
    <div style={{...S.section,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <button style={{...S.toggleBtn,color:been?"#6ee7b7":"#f0b429",borderColor:been?"#6ee7b730":"#f0b42930"}}
        onClick={onToggleStatus}>{been?"↩ 改为想去":"✓ 标记去过"}</button>
      {been&&ar>0&&<div style={{fontSize:13,color:"#f0b429"}}>
        {"★".repeat(Math.round(ar))}{"☆".repeat(5-Math.round(ar))}
        <span style={{fontSize:10,color:"#334",marginLeft:4}}>均分</span>
      </div>}
    </div>

    {/* Visits Timeline */}
    {been&&<div style={S.section}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={S.microLabel}>打卡 ({(r.visits||[]).length}次)</span>
        <button style={S.editBtn} onClick={()=>setAddingVisit(true)}>+ 再去一次</button>
      </div>
      {addingVisit&&<div style={{marginBottom:12}}>
        <VisitSheet onSave={v=>{onAddVisit(v);setAddingVisit(false);}} onClose={()=>setAddingVisit(false)}/>
      </div>}
      {(r.visits||[]).length===0&&!addingVisit&&(
        <div style={{fontSize:12,color:"#222236"}}>还没有打卡记录</div>
      )}
      {(r.visits||[]).slice().reverse().map(v=>(
        <div key={v.id} style={S.visitCard}>
          <div style={{fontSize:12,color:"#446",fontWeight:600,marginBottom:6}}>📅 {v.date}</div>
          {(v.dishes||[]).length===0&&<div style={{fontSize:12,color:"#2a2a3a"}}>未记录菜品</div>}
          {(v.dishes||[]).map((d,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
              <span style={{fontSize:13,color:"#9090a8"}}>{d.name}</span>
              {d.rating>0&&<Stars value={d.rating} size={13} readonly={true}/>}
            </div>
          ))}
          {v.note&&<div style={{fontSize:12,color:"#446",marginTop:4}}>{v.note}</div>}
        </div>
      ))}
    </div>}

    {/* Navigate */}
    <button style={{...S.btn,display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:8}}
      className="press" onClick={()=>setNavSheet(r)}>🗺️ 导航到这里</button>
  </div></main>);
}

        onClick={()=>setForm({...form,category:c.name})}>{c.name}</button>)}

}

/* ── SettingsView ──────────────────────────────────── */
function SettingsView({cats,setCats,exportData,importData,stats}){
  const[catsOpen,setCatsOpen]=useState(false);
  const[colorFor,setColorFor]=useState(null);// cat name whose picker is open
  const[nn,setNn]=useState("");
  const[err,setErr]=useState("");
  const[newColor,setNewColor]=useState(COLORS[0]);
  const fileRef=useRef();

  function doAdd(){
    const n=nn.trim();if(!n)return;
    if(cats.find(c=>c.name===n)){setErr("已有同名");return}
    setCats(p=>[...p,{name:n,color:newColor}]);setNn("");setErr("");
  }
  function changeColor(name,col){
    setCats(p=>p.map(c=>c.name===name?{...c,color:col}:c));
    setColorFor(null);
  }
  function delCat(name){
    if(cats.length<=1){setErr("至少保留一个");return}
    setCats(p=>p.filter(c=>c.name!==name));
    if(colorFor===name)setColorFor(null);
  }

  return(<main style={S.main}><div style={S.formCard}>
    <h2 style={S.formTitle}>设置</h2>

    {/* Categories collapsible */}
    <button style={S.collapseHdr} onClick={()=>{setCatsOpen(!catsOpen);setColorFor(null)}}>
      <span style={{fontSize:13,fontWeight:600,color:"#d0d0e0"}}>菜系分类</span>
      <span style={{fontSize:12,color:"#334",display:"inline-block",transform:catsOpen?"rotate(0)":"rotate(-90deg)",transition:"transform 0.2s"}}>▾</span>
    </button>
    {catsOpen&&<div style={{...S.section,marginTop:0,borderTop:"none",borderRadius:"0 0 10px 10px"}}>
      {/* Tag cloud */}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
        {cats.map(c=>(
          <div key={c.name} style={{display:"inline-flex",alignItems:"center",gap:4,
            background:"#14142a",borderRadius:20,padding:"4px 8px 4px 6px",border:"1px solid #1e1e30"}}>
            <button style={{background:"none",border:"none",cursor:"pointer",padding:0,lineHeight:1}}
              title="换颜色" onClick={()=>setColorFor(colorFor===c.name?null:c.name)}>
              <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:c.color,flexShrink:0}}/>
            </button>
            <span style={{fontSize:12,color:"#c0c0d8"}}>{c.name}</span>
            <button style={{background:"none",border:"none",cursor:"pointer",color:"#334",fontSize:11,padding:"0 0 0 2px",lineHeight:1}}
              onClick={()=>delCat(c.name)}>✕</button>
          </div>
        ))}
      </div>
      {/* Inline color picker for selected cat */}
      {colorFor&&<div style={{marginBottom:10,padding:"8px 10px",background:"#0c0c14",borderRadius:8,border:"1px solid #1e1e30"}}>
        <div style={{fontSize:10,color:"#334",marginBottom:6}}>「{colorFor}」换颜色</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {COLORS.map(col=>(
            <button key={col} style={{width:18,height:18,borderRadius:4,border:"none",cursor:"pointer",
              background:col,outline:cats.find(c=>c.name===colorFor)?.color===col?"2px solid #fff":"none",outlineOffset:2}}
              onClick={()=>changeColor(colorFor,col)}/>
          ))}
        </div>
      </div>}
      {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:6}}>{err}</div>}
      {/* Add new */}
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <input style={{...S.input,flex:1,padding:"7px 10px",fontSize:13}} placeholder="新菜系名称"
          value={nn} onChange={e=>{setNn(e.target.value);setErr("")}}
          onKeyDown={e=>e.key==="Enter"&&doAdd()}/>
        <div style={{display:"flex",gap:3}}>
          {COLORS.slice(0,7).map(col=>(
            <button key={col} style={{width:16,height:16,borderRadius:3,border:"none",cursor:"pointer",
              background:col,outline:newColor===col?"2px solid #fff":"none",outlineOffset:1}}
              onClick={()=>setNewColor(col)}/>
          ))}
        </div>
        <button style={{background:"#fff",color:"#0c0c14",border:"none",borderRadius:8,
          padding:"7px 12px",fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0}}
          onClick={doAdd}>+</button>
      </div>
    </div>}

    {/* Data */}
    <div style={{marginTop:20}}>
      <div style={S.microLabel}>数据管理</div>
      <div style={{fontSize:12,color:"#334",margin:"6px 0 10px"}}>
        {stats.restaurants} 家餐厅 · {stats.visits} 次打卡
      </div>
      <button style={{...S.btn,background:"#151f30",color:"#60a0e0",border:"1px solid #1e3050",marginTop:0}}
        onClick={exportData}>📥 导出备份 (JSON)</button>
      <button style={{...S.btn,background:"#1a1520",color:"#a080d0",border:"1px solid #2a1e40",marginTop:8}}
        onClick={()=>fileRef.current?.click()}>📤 导入恢复</button>
      <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
      <div style={{fontSize:11,color:"#1e1e2e",marginTop:10,textAlign:"center"}}>定期导出，换手机数据不丢失</div>
    </div>

    {/* About */}
    <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid #14142a"}}>
      <div style={S.microLabel}>关于</div>
      <div style={{fontSize:12,color:"#223",marginTop:6}}>withfriends v{VER}</div>
    </div>
  </div></main>);
}
